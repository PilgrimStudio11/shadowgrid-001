<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0F172A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Накопления">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230F172A'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='%23F59E0B' font-family='Arial'%3E💰%3C/text%3E%3C/svg%3E">
    <title>Накопления — надёжная версия</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #F8FAFC;
            color: #0F172A;
            padding: 20px 16px 40px;
            transition: background 0.2s, color 0.2s;
        }
        body.dark { background: #0F172A; color: #E2E8F0; }
        .card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(226, 232, 240, 0.6);
        }
        body.dark .card { background: rgba(30, 41, 59, 0.9); border-color: #334155; }
        .grid-buttons { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        button, .btn {
            background: #0F172A;
            border: none;
            padding: 10px 20px;
            border-radius: 44px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }
        button:active { transform: scale(0.96); }
        .btn-accent { background: #F59E0B; color: #0F172A; }
        .btn-outline { background: white; border: 1px solid #CBD5E1; color: #0F172A; }
        body.dark .btn-outline { background: #1E293B; border-color: #475569; color: #E2E8F0; }
        .modal {
            display: none;
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-card { max-width: 500px; margin: 20px; background: white; max-height: 90vh; overflow-y: auto; border-radius: 28px; padding: 20px; }
        body.dark .modal-card { background: #1E293B; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 4px; color: #475569; }
        body.dark label { color: #94A3B8; }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 24px;
            border: 1px solid #CBD5E1;
            background: white;
            font-size: 0.9rem;
        }
        body.dark input, body.dark select, body.dark textarea { background: #1E293B; border-color: #475569; color: #E2E8F0; }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            margin-top: 12px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 600px;
        }
        th, td {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid #E2E8F0;
            white-space: nowrap;
        }
        body.dark th, body.dark td { border-bottom-color: #334155; }
        .money-positive { color: #10B981; font-weight: 600; }
        .money-negative { color: #EF4444; }
        .forecast { color: #F59E0B; font-weight: 500; }
        .progress-bar { background: #E2E8F0; border-radius: 20px; height: 12px; overflow: hidden; margin: 12px 0; }
        .progress-fill { background: #F59E0B; width: 0%; height: 100%; transition: width 0.3s; }
        .category-badge { display: inline-flex; align-items: center; gap: 4px; background: #E2E8F0; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .editable-cell {
            cursor: pointer;
            background: rgba(245,158,11,0.1);
            border-radius: 8px;
            padding: 4px 8px;
            display: inline-block;
            min-width: 80px;
        }
        .editable-cell input {
            width: 90px;
            padding: 4px;
            font-size: 0.8rem;
        }
        @media (max-width: 640px) { body { padding: 16px 12px; } .editable-cell input { width: 70px; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<div id="appContent">
<div style="max-width:1400px; margin:0 auto;">
    <div class="card" style="background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%); color: white; border: none;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1 style="color:white;">💰 Накопления</h1>
            <div><button id="themeToggleBtn" style="background:rgba(255,255,255,0.2);">🌓 Тема</button></div>
        </div>
        <div class="grid-buttons" style="margin-top:12px;">
            <button id="openAddBtn" class="btn-accent">+ Доход</button>
            <button id="openExpenseBtn">- Расход</button>
            <button id="undoBtn">↩️ Отменить</button>
            <button id="redoBtn">↪️ Повторить</button>
            <button id="exportJsonBtn">💾 Экспорт JSON</button>
            <button id="importJsonBtn">📂 Импорт JSON</button>
            <input type="file" id="importFileInput" accept=".json" style="display: none;">
        </div>
    </div>

    <!-- Дашборд -->
    <div class="card" id="dashboard">
        <h3>📊 Текущий баланс</h3>
        <div id="balanceDisplay" style="font-size: 2rem; font-weight: bold;">0 ₽</div>
    </div>

    <!-- Вкладки -->
    <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;">
        <button id="tabYears" class="btn btn-accent">📆 Прогноз 40 лет</button>
        <button id="tabMonths" class="btn btn-outline">📅 Месяцы</button>
        <button id="tabLog" class="btn btn-outline">📜 Лог операций</button>
        <button id="tabAnalytics" class="btn btn-outline">📊 Аналитика</button>
        <button id="tabGoal" class="btn btn-outline">🎯 Цель</button>
        <button id="tabBudget" class="btn btn-outline">💰 Бюджеты</button>
        <button id="tabMembers" class="btn btn-outline">👥 Участники</button>
        <button id="tabSettings" class="btn btn-outline">⚙️ Настройки</button>
    </div>

    <!-- Панели -->
    <div id="yearsPanel" class="card"></div>
    <div id="monthsPanel" class="card" style="display: none;"></div>
    <div id="logPanel" class="card" style="display: none;">
        <div class="flex-row" style="margin-bottom: 16px;">
            <input type="text" id="logSearch" placeholder="🔍 Поиск">
            <select id="logTypeFilter"><option value="">Все типы</option><option value="income">Доходы</option><option value="expense">Расходы</option></select>
            <select id="logCategoryFilter"><option value="">Все категории</option></select>
            <select id="logMemberFilter"><option value="">Все участники</option></select>
        </div>
        <div id="logTableContainer"></div>
    </div>
    <div id="analyticsPanel" class="card" style="display: none;">
        <div id="comparePeriods"></div>
        <canvas id="weekdayChart" width="400" height="200" style="max-width:100%;"></canvas>
        <div class="flex-row"><canvas id="incomeChart" width="200" height="200"></canvas><canvas id="expenseChart" width="200" height="200"></canvas></div>
    </div>
    <div id="goalPanel" class="card" style="display: none;">
        <div class="form-group"><label>Название цели</label><input type="text" id="goalName" placeholder="Например: Новая машина"></div>
        <div class="form-group"><label>Целевая сумма (₽)</label><input type="number" id="goalTarget" step="1000"></div>
        <div class="form-group"><label>Дата достижения</label><input type="date" id="goalDate"></div>
        <div class="form-group"><label>Начальный взнос (₽)</label><input type="number" id="goalInitial" step="1000" value="0"></div>
        <button id="saveGoalBtn" class="btn-accent">Сохранить цель</button>
        <div id="goalProgressDetail" style="margin-top: 20px;"></div>
    </div>
    <div id="budgetPanel" class="card" style="display: none;">
        <h3>Бюджеты по категориям (в месяц)</h3>
        <div id="budgetsList"></div>
        <div class="flex-row" style="margin-top: 16px;">
            <select id="budgetCategorySelect" style="flex:2;"></select>
            <input type="number" id="budgetLimit" placeholder="Лимит ₽" style="flex:1;">
            <button id="setBudgetBtn" class="btn-outline">Установить</button>
        </div>
    </div>
    <div id="membersPanel" class="card" style="display: none;">
        <h3>Участники семьи</h3>
        <div id="membersList"></div>
        <div class="flex-row" style="margin-top: 16px;">
            <input type="text" id="newMemberName" placeholder="Имя участника" style="flex:2;">
            <button id="addMemberBtn" class="btn-outline">Добавить</button>
        </div>
    </div>
    <div id="settingsPanel" class="card" style="display: none;">
        <h3>Процентная ставка</h3>
        <div class="flex-row"><input type="number" id="globalPercent" step="0.5" value="5" style="width:100px;"> %</div>
        <div><label><input type="radio" name="interestType" value="simple" checked> Простой процент</label> <label><input type="radio" name="interestType" value="compound"> Капитализация</label></div>
        <hr style="margin: 16px 0;">
        <h3>Тёмная тема</h3>
        <button id="darkModeToggle" class="btn-outline">Переключить тему</button>
        <hr>
        <h3>Уведомления</h3>
        <button id="requestNotifyBtn" class="btn-outline">Разрешить уведомления</button>
        <p style="font-size:0.7rem; margin-top:8px;">Все данные сохраняются локально. При проблемах с PWA очистите кэш Safari.</p>
    </div>
</div>
<footer style="text-align:center; font-size:0.7rem; margin-top:20px;">Данные автосохраняются. Редактируйте ячейки в таблице прогноза.</footer>
</div>

<script>
    // ======================== ГЛОБАЛЬНОЕ СОСТОЯНИЕ ========================
    let appData = {
        transactions: [],
        budgets: {},
        members: ["Я", "Супруг(а)", "Дети"],
        goal: { name: "", target: 0, date: "", initial: 0 },
        settings: {
            darkMode: false,
            defaultInterest: 5,
            interestType: "simple",
            widgets: ["balance", "goal", "recent"],
            notifyBudget: false,
            notifyGoal: false
        },
        yearlyOverrides: {}
    };

    let undoStack = [];
    let redoStack = [];
    let charts = {};
    let currentEditId = null;

    // DOM элементы
    const balanceDisplay = document.getElementById('balanceDisplay');
    const yearsPanel = document.getElementById('yearsPanel');
    const monthsPanel = document.getElementById('monthsPanel');
    const logTableContainer = document.getElementById('logTableContainer');
    const analyticsPanel = document.getElementById('analyticsPanel');
    const goalPanel = document.getElementById('goalPanel');
    const budgetPanel = document.getElementById('budgetPanel');
    const membersPanel = document.getElementById('membersPanel');
    const settingsPanel = document.getElementById('settingsPanel');
    const logSearch = document.getElementById('logSearch');
    const logTypeFilter = document.getElementById('logTypeFilter');
    const logCategoryFilter = document.getElementById('logCategoryFilter');
    const logMemberFilter = document.getElementById('logMemberFilter');
    const themeToggle = document.getElementById('themeToggleBtn');
    const darkModeToggle = document.getElementById('darkModeToggle');
    const openAddBtn = document.getElementById('openAddBtn');
    const openExpenseBtn = document.getElementById('openExpenseBtn');
    const undoBtn = document.getElementById('undoBtn');
    const redoBtn = document.getElementById('redoBtn');
    const exportJsonBtn = document.getElementById('exportJsonBtn');
    const importJsonBtn = document.getElementById('importJsonBtn');
    const importFileInput = document.getElementById('importFileInput');
    const globalPercent = document.getElementById('globalPercent');
    const saveGoalBtn = document.getElementById('saveGoalBtn');
    const goalName = document.getElementById('goalName');
    const goalTarget = document.getElementById('goalTarget');
    const goalDate = document.getElementById('goalDate');
    const goalInitial = document.getElementById('goalInitial');
    const budgetCategorySelect = document.getElementById('budgetCategorySelect');
    const budgetLimit = document.getElementById('budgetLimit');
    const setBudgetBtn = document.getElementById('setBudgetBtn');
    const newMemberName = document.getElementById('newMemberName');
    const addMemberBtn = document.getElementById('addMemberBtn');
    const requestNotifyBtn = document.getElementById('requestNotifyBtn');
    const tabYears = document.getElementById('tabYears');
    const tabMonths = document.getElementById('tabMonths');
    const tabLog = document.getElementById('tabLog');
    const tabAnalytics = document.getElementById('tabAnalytics');
    const tabGoal = document.getElementById('tabGoal');
    const tabBudget = document.getElementById('tabBudget');
    const tabMembers = document.getElementById('tabMembers');
    const tabSettings = document.getElementById('tabSettings');

    let activeTab = 'years';

    // ======================== СОХРАНЕНИЕ И ЗАГРУЗКА ========================
    function saveToLocalStorage() {
        try {
            localStorage.setItem('savings_app_data_v2', JSON.stringify(appData));
            console.log('Data saved', new Date().toISOString());
        } catch(e) { console.warn('Save error', e); }
    }

    function loadFromLocalStorage() {
        const saved = localStorage.getItem('savings_app_data_v2');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                appData = data;
                console.log('Data loaded', appData.transactions.length);
            } catch(e) { console.warn('Load error', e); }
        }
        // Гарантируем структуру
        if (!appData.transactions) appData.transactions = [];
        if (!appData.budgets) appData.budgets = {};
        if (!appData.members) appData.members = ["Я", "Супруг(а)", "Дети"];
        if (!appData.goal) appData.goal = { name: "", target: 0, date: "", initial: 0 };
        if (!appData.settings) appData.settings = { darkMode: false, defaultInterest: 5, interestType: "simple", widgets: ["balance","goal","recent"], notifyBudget: false, notifyGoal: false };
        if (!appData.yearlyOverrides) appData.yearlyOverrides = {};
        if (appData.settings.darkMode) document.body.classList.add('dark'); else document.body.classList.remove('dark');
        globalPercent.value = appData.settings.defaultInterest;
        if (appData.settings.interestType === 'compound') document.querySelector('input[value="compound"]').checked = true;
        else document.querySelector('input[value="simple"]').checked = true;
    }

    function pushState() {
        undoStack.push(JSON.parse(JSON.stringify(appData)));
        redoStack = [];
        if (undoStack.length > 50) undoStack.shift();
        saveToLocalStorage();
    }

    function undo() {
        if (undoStack.length === 0) return;
        const prev = undoStack.pop();
        redoStack.push(JSON.parse(JSON.stringify(appData)));
        appData = prev;
        saveToLocalStorage();
        renderAll();
    }
    function redo() {
        if (redoStack.length === 0) return;
        const next = redoStack.pop();
        undoStack.push(JSON.parse(JSON.stringify(appData)));
        appData = next;
        saveToLocalStorage();
        renderAll();
    }

    // ======================== ФИНАНСОВЫЕ ФУНКЦИИ ========================
    function getCurrentBalance() {
        return appData.transactions.reduce((s,t)=>s+t.amount, 0);
    }
    function getBalanceUpToDate(dateStr) {
        return appData.transactions.filter(t=>t.date<=dateStr).reduce((s,t)=>s+t.amount, 0);
    }
    function getMonthlyNet(year, month) {
        const start = `${year}-${String(month).padStart(2,'0')}-01`;
        const end = `${year}-${String(month).padStart(2,'0')}-${new Date(year, month, 0).getDate()}`;
        return appData.transactions.filter(t=>t.date>=start && t.date<=end).reduce((s,t)=>s+t.amount, 0);
    }
    function getYearlyForecast() {
        const yearsSet = new Set();
        appData.transactions.forEach(t=>yearsSet.add(parseInt(t.date.slice(0,4))));
        Object.keys(appData.yearlyOverrides).forEach(y=>yearsSet.add(parseInt(y)));
        if (yearsSet.size === 0 && Object.keys(appData.yearlyOverrides).length === 0) return [];
        const minYear = Math.min(...yearsSet);
        const curYear = new Date().getFullYear();
        const maxYear = curYear + 40;
        const years = [];
        for (let y = minYear; y <= maxYear; y++) years.push(y);
        const result = [];
        for (let i=0; i<years.length; i++) {
            const year = years[i];
            const isPast = year <= curYear;
            let startBalance;
            if (i === 0) {
                const defaultStart = getBalanceUpToDate(`${year}-01-01`);
                startBalance = appData.yearlyOverrides[year]?.startBalance !== undefined ? appData.yearlyOverrides[year].startBalance : defaultStart;
            } else {
                const prev = result[i-1];
                const prevBalance = prev.isPast ? prev.actualEnd : prev.forecastEnd;
                startBalance = appData.yearlyOverrides[year]?.startBalance !== undefined ? appData.yearlyOverrides[year].startBalance : prevBalance;
            }
            let baseAdded=0, baseWithdrawn=0;
            if (isPast) {
                appData.transactions.forEach(t=>{
                    if (parseInt(t.date.slice(0,4)) === year) {
                        if (t.amount>0) baseAdded += t.amount;
                        else baseWithdrawn += Math.abs(t.amount);
                    }
                });
            }
            const added = appData.yearlyOverrides[year]?.added !== undefined ? appData.yearlyOverrides[year].added : baseAdded;
            const withdrawn = appData.yearlyOverrides[year]?.withdrawn !== undefined ? appData.yearlyOverrides[year].withdrawn : baseWithdrawn;
            const net = added - withdrawn;
            const interest = appData.yearlyOverrides[year]?.interest !== undefined ? appData.yearlyOverrides[year].interest : appData.settings.defaultInterest;
            let forecast;
            if (appData.settings.interestType === "simple") {
                forecast = startBalance * (1 + interest/100) + net;
            } else {
                let bal = startBalance;
                for (let m=1; m<=12; m++) {
                    const monthlyNet = getMonthlyNet(year, m);
                    bal = bal * (1 + interest/100/12) + monthlyNet;
                }
                forecast = bal;
            }
            const actualEnd = isPast ? getBalanceUpToDate(`${year}-12-31`) : null;
            result.push({ year, startBalance, added, withdrawn, net, interest, forecastEnd: forecast, actualEnd, isPast });
        }
        return result;
    }

    // ======================== ОПЕРАЦИИ ========================
    function addTransaction(amount, type, date, category, member, desc) {
        if (!date) date = new Date().toISOString().slice(0,10);
        const finalAmount = type === 'income' ? Math.abs(amount) : -Math.abs(amount);
        pushState();
        appData.transactions.push({
            id: Date.now() + Math.random(),
            date: date,
            amount: finalAmount,
            category: category,
            member: member || "Я",
            description: desc || ""
        });
        appData.transactions.sort((a,b)=>a.date.localeCompare(b.date));
        saveToLocalStorage();
        renderAll();
    }
    function deleteTransaction(id) {
        pushState();
        appData.transactions = appData.transactions.filter(t => t.id !== id);
        saveToLocalStorage();
        renderAll();
    }
    function updateTransaction(id, newData) {
        pushState();
        const idx = appData.transactions.findIndex(t => t.id === id);
        if (idx !== -1) {
            appData.transactions[idx] = { ...appData.transactions[idx], ...newData };
            appData.transactions.sort((a,b)=>a.date.localeCompare(b.date));
            saveToLocalStorage();
            renderAll();
        }
    }
    function updateYearlyOverride(year, field, value) {
        pushState();
        if (!appData.yearlyOverrides[year]) appData.yearlyOverrides[year] = {};
        appData.yearlyOverrides[year][field] = value;
        if (value === undefined || value === null || (typeof value === 'number' && isNaN(value))) {
            delete appData.yearlyOverrides[year][field];
            if (Object.keys(appData.yearlyOverrides[year]).length === 0) delete appData.yearlyOverrides[year];
        }
        saveToLocalStorage();
        renderAll();
    }

    // ======================== РЕНДЕР ========================
    function renderDashboard() {
        balanceDisplay.innerText = getCurrentBalance().toLocaleString() + ' ₽';
    }

    function renderYears() {
        const data = getYearlyForecast();
        if (data.length === 0) {
            yearsPanel.innerHTML = '<p>Нет данных. Добавьте операции или отредактируйте таблицу вручную (клик по ячейке).</p>';
            return;
        }
        let html = `<h3>📈 Прогноз на 40 лет (${appData.settings.interestType === 'simple' ? 'простой %' : 'капитализация'})</h3>
        <p style="font-size:0.8rem;">✏️ Кликните по значению в таблице, чтобы отредактировать (начальный баланс, пополнения, снятия, процент).</p>
        <div class="table-wrapper">
        <table>
            <thead><tr>
                <th>Год</th><th>Нач. баланс (₽)</th><th>Пополн. (₽)</th><th>Снято (₽)</th><th>% ставка</th><th>Прогноз (конец года)</th><th>Факт (конец года)</th>
            </tr></thead>
            <tbody>`;
        for (let row of data) {
            html += `<tr>
                <td>${row.year}</td>
                <td><span class="editable-cell" data-year="${row.year}" data-field="startBalance">${row.startBalance.toLocaleString()}</span></td>
                <td><span class="editable-cell" data-year="${row.year}" data-field="added">${row.added.toLocaleString()}</span></td>
                <td><span class="editable-cell" data-year="${row.year}" data-field="withdrawn">${row.withdrawn.toLocaleString()}</span></td>
                <td><span class="editable-cell" data-year="${row.year}" data-field="interest">${row.interest}</span> %</td>
                <td class="forecast">${row.forecastEnd.toLocaleString()} ₽</td>
                <td>${row.actualEnd !== null ? row.actualEnd.toLocaleString() + ' ₽' : '—'}</td>
            </tr>`;
        }
        html += `</tbody></table></div>`;
        yearsPanel.innerHTML = html;
        // Обработчики для редактируемых ячеек
        document.querySelectorAll('.editable-cell').forEach(cell => {
            cell.onclick = (e) => {
                e.stopPropagation();
                const year = parseInt(cell.dataset.year);
                const field = cell.dataset.field;
                const current = field === 'interest' ? parseFloat(cell.innerText) : parseInt(cell.innerText.replace(/\s/g,''));
                const input = document.createElement('input');
                input.type = 'number';
                input.step = field === 'interest' ? '0.1' : '1';
                input.value = current;
                input.style.width = '90px';
                const parent = cell.parentElement;
                const originalText = cell.innerText;
                cell.innerText = '';
                cell.appendChild(input);
                input.focus();
                const save = () => {
                    let newVal = parseFloat(input.value);
                    if (isNaN(newVal)) newVal = field === 'interest' ? appData.settings.defaultInterest : 0;
                    if (field === 'interest') newVal = parseFloat(newVal.toFixed(1));
                    else newVal = Math.round(newVal);
                    updateYearlyOverride(year, field, newVal);
                    cell.innerText = newVal.toLocaleString();
                    cell.removeChild(input);
                };
                input.onblur = save;
                input.onkeypress = (e) => { if (e.key === 'Enter') save(); };
            };
        });
        // График
        const existingCanvas = yearsPanel.querySelector('#forecastChart');
        if (existingCanvas) existingCanvas.remove();
        const canvas = document.createElement('canvas');
        canvas.id = 'forecastChart';
        canvas.width = 800;
        canvas.height = 300;
        canvas.style.maxWidth = '100%';
        yearsPanel.appendChild(canvas);
        if (window.forecastChart) window.forecastChart.destroy();
        const yearsLabels = data.map(r => r.year);
        const forecastData = data.map(r => r.forecastEnd);
        const actualData = data.map(r => r.actualEnd);
        window.forecastChart = new Chart(canvas, {
            type: 'line',
            data: {
                labels: yearsLabels,
                datasets: [
                    { label: 'Прогноз (конец года)', data: forecastData, borderColor: '#F59E0B', backgroundColor: 'rgba(245,158,11,0.1)', tension: 0.3, fill: true },
                    { label: 'Факт (конец года)', data: actualData, borderColor: '#10B981', backgroundColor: 'transparent', tension: 0.3, borderDash: [5,5] }
                ]
            },
            options: { responsive: true, maintainAspectRatio: true, plugins: { tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw?.toLocaleString()} ₽` } } } }
        });
    }

    function renderMonths() {
        const monthly = new Map();
        let running = 0;
        [...appData.transactions].sort((a,b)=>a.date.localeCompare(b.date)).forEach(t => {
            running += t.amount;
            const ym = t.date.slice(0,7);
            if (!monthly.has(ym)) monthly.set(ym, { add:0, sub:0, bal:0 });
            const rec = monthly.get(ym);
            if (t.amount > 0) rec.add += t.amount;
            else rec.sub += Math.abs(t.amount);
            rec.bal = running;
        });
        if (monthly.size === 0) { monthsPanel.innerHTML = '<p>Нет операций</p>'; return; }
        let html = `<h3>📅 Помесячная динамика</h3><div class="table-wrapper"><table><thead><tr><th>Месяц</th><th>Пополнения</th><th>Снятия</th><th>Чистое</th><th>Баланс</th></tr></thead><tbody>`;
        for (let [ym, rec] of monthly.entries()) {
            const net = rec.add - rec.sub;
            html += `<tr><td>${ym}</td><td class="money-positive">${rec.add.toLocaleString()} ₽</td><td class="money-negative">${rec.sub.toLocaleString()} ₽</td><td>${net>=0?'+':''}${net.toLocaleString()} ₽</td><td><strong>${rec.bal.toLocaleString()} ₽</strong></td></tr>`;
        }
        html += `</tbody></table></div>`;
        monthsPanel.innerHTML = html;
    }

    function renderLog() {
        let filtered = [...appData.transactions];
        const search = logSearch.value.toLowerCase();
        const type = logTypeFilter.value;
        const cat = logCategoryFilter.value;
        const member = logMemberFilter.value;
        if (search) filtered = filtered.filter(t => (t.description||'').toLowerCase().includes(search) || t.category.toLowerCase().includes(search));
        if (type === 'income') filtered = filtered.filter(t => t.amount > 0);
        if (type === 'expense') filtered = filtered.filter(t => t.amount < 0);
        if (cat) filtered = filtered.filter(t => t.category === cat);
        if (member) filtered = filtered.filter(t => t.member === member);
        filtered.sort((a,b)=>b.date.localeCompare(a.date));
        const allCats = new Set(appData.transactions.map(t=>t.category));
        logCategoryFilter.innerHTML = '<option value="">Все категории</option>' + Array.from(allCats).map(c=>`<option value="${c}">${c}</option>`).join('');
        logMemberFilter.innerHTML = '<option value="">Все участники</option>' + appData.members.map(m=>`<option value="${m}">${m}</option>`).join('');
        if (filtered.length === 0) { logTableContainer.innerHTML = '<p>Нет записей</p>'; return; }
        let html = `<div class="table-wrapper"><table><thead><tr><th>Дата</th><th>Сумма</th><th>Категория</th><th>Участник</th><th>Комментарий</th><th></th></tr></thead><tbody>`;
        filtered.forEach(t => {
            html += `<tr>
                <td>${t.date}</td>
                <td class="${t.amount>0?'money-positive':'money-negative'}">${t.amount>0?'+':''}${t.amount.toLocaleString()} ₽</td>
                <td><span class="category-badge">${t.category}</span></td>
                <td>${t.member}</td>
                <td>${t.description||''}</td>
                <td><button class="edit-btn" data-id="${t.id}">✏️</button> <button class="delete-btn" data-id="${t.id}">🗑️</button></td>
            </tr>`;
        });
        html += `</tbody></table></div>`;
        logTableContainer.innerHTML = html;
        document.querySelectorAll('.delete-btn').forEach(btn => btn.onclick = () => deleteTransaction(parseInt(btn.dataset.id)));
        document.querySelectorAll('.edit-btn').forEach(btn => btn.onclick = () => openEditModal(parseInt(btn.dataset.id)));
    }

    function renderAnalytics() {
        const now = new Date();
        const thisYear = now.getFullYear(), thisMonth = now.getMonth()+1;
        let thisMonthFlow=0, lastMonthFlow=0, lastYearMonthFlow=0;
        appData.transactions.forEach(t=>{
            const [y,m] = t.date.split('-');
            if (y==thisYear && m==thisMonth) thisMonthFlow += t.amount;
            if ((y==thisYear && m==thisMonth-1) || (m==12 && y==thisYear-1)) lastMonthFlow += t.amount;
            if (y==thisYear-1 && m==thisMonth) lastYearMonthFlow += t.amount;
        });
        document.getElementById('comparePeriods').innerHTML = `<h3>📈 Сравнение</h3><p>💰 Этот месяц: ${thisMonthFlow.toLocaleString()} ₽</p><p>📉 Прошлый месяц: ${lastMonthFlow.toLocaleString()} ₽ (${((thisMonthFlow-lastMonthFlow)/lastMonthFlow*100||0).toFixed(1)}%)</p><p>📆 Аналогичный месяц прошлого года: ${lastYearMonthFlow.toLocaleString()} ₽ (${((thisMonthFlow-lastYearMonthFlow)/lastYearMonthFlow*100||0).toFixed(1)}%)</p>`;
        const weekday = [0,0,0,0,0,0,0];
        appData.transactions.forEach(t=>{ const w = new Date(t.date).getDay(); weekday[w] += t.amount; });
        if (charts.weekday) charts.weekday.destroy();
        charts.weekday = new Chart(document.getElementById('weekdayChart'), { type:'bar', data:{ labels:['Вс','Пн','Вт','Ср','Чт','Пт','Сб'], datasets:[{ label:'Чистый поток', data:weekday, backgroundColor:'#F59E0B' }] } });
        const incomeByCat={}, expenseByCat={};
        appData.transactions.forEach(t=>{ if(t.amount>0) incomeByCat[t.category]=(incomeByCat[t.category]||0)+t.amount; else expenseByCat[t.category]=(expenseByCat[t.category]||0)+Math.abs(t.amount); });
        if (charts.income) charts.income.destroy();
        if (charts.expense) charts.expense.destroy();
        charts.income = new Chart(document.getElementById('incomeChart'), { type:'pie', data:{ labels:Object.keys(incomeByCat), datasets:[{ data:Object.values(incomeByCat), backgroundColor:['#10B981','#3B82F6','#F59E0B','#EF4444','#8B5CF6'] }] } });
        charts.expense = new Chart(document.getElementById('expenseChart'), { type:'pie', data:{ labels:Object.keys(expenseByCat), datasets:[{ data:Object.values(expenseByCat), backgroundColor:['#F59E0B','#EF4444','#8B5CF6','#EC4899'] }] } });
    }

    function renderGoal() {
        if (appData.goal.target) {
            const saved = getCurrentBalance() + (appData.goal.initial||0);
            const percent = Math.min(100, saved/appData.goal.target*100);
            let monthlyNeed = 0;
            if (appData.goal.date) {
                const today = new Date(), targetDate = new Date(appData.goal.date);
                const monthsLeft = Math.max(1, (targetDate.getFullYear()-today.getFullYear())*12 + (targetDate.getMonth()-today.getMonth()));
                const needed = Math.max(0, appData.goal.target - saved);
                monthlyNeed = needed / monthsLeft;
            }
            document.getElementById('goalProgressDetail').innerHTML = `<div class="progress-bar"><div class="progress-fill" style="width:${percent}%;"></div></div><p>Накоплено: ${saved.toLocaleString()} / ${appData.goal.target.toLocaleString()} ₽ (${percent.toFixed(1)}%)</p><p>Осталось: ${(appData.goal.target-saved).toLocaleString()} ₽</p>${monthlyNeed?`<p>Нужно откладывать ~${monthlyNeed.toLocaleString()} ₽/мес</p>`:''}<p>Дата: ${appData.goal.date||'не задана'}</p>`;
        } else document.getElementById('goalProgressDetail').innerHTML = '<p>Цель не задана. Заполните форму выше.</p>';
    }

    function renderBudgets() {
        const now = new Date(), year = now.getFullYear(), month = now.getMonth()+1;
        const start = `${year}-${String(month).padStart(2,'0')}-01`;
        const end = `${year}-${String(month).padStart(2,'0')}-${new Date(year, month, 0).getDate()}`;
        const spent = {};
        appData.transactions.forEach(t=>{ if(t.date>=start && t.date<=end && t.amount<0) spent[t.category] = (spent[t.category]||0)+Math.abs(t.amount); });
        let html = '';
        for (let cat in appData.budgets) {
            const limit = appData.budgets[cat], used = spent[cat]||0, percent = used/limit*100;
            let color = '#10B981'; if (percent>=100) color='#EF4444'; else if (percent>=80) color='#F59E0B';
            html += `<div><strong>${cat}</strong>: ${used.toLocaleString()} / ${limit.toLocaleString()} ₽</div><div class="progress-bar"><div style="width:${Math.min(100,percent)}%; height:8px; background:${color}; border-radius:20px;"></div></div>`;
        }
        document.getElementById('budgetsList').innerHTML = html || '<p>Нет установленных бюджетов</p>';
        const allCats = new Set(appData.transactions.map(t=>t.category));
        budgetCategorySelect.innerHTML = Array.from(allCats).map(c=>`<option value="${c}">${c}</option>`).join('');
    }

    function renderMembers() {
        document.getElementById('membersList').innerHTML = appData.members.map(m => `<span class="category-badge" style="margin:4px;">${m} <button class="remove-member" data-member="${m}" style="background:none; border:none; color:red;">✖</button></span>`).join('');
        document.querySelectorAll('.remove-member').forEach(btn => btn.onclick = () => {
            pushState();
            appData.members = appData.members.filter(m => m !== btn.dataset.member);
            saveToLocalStorage();
            renderMembers();
            renderLog();
        });
    }

    function renderSettings() {
        globalPercent.value = appData.settings.defaultInterest;
        if (appData.settings.interestType === 'compound') document.querySelector('input[value="compound"]').checked = true;
        else document.querySelector('input[value="simple"]').checked = true;
    }

    function renderAll() {
        renderDashboard();
        renderYears();
        renderMonths();
        renderLog();
        renderAnalytics();
        renderGoal();
        renderBudgets();
        renderMembers();
        renderSettings();
        const panels = {
            years: yearsPanel, months: monthsPanel, log: document.getElementById('logPanel'),
            analytics: analyticsPanel, goal: goalPanel, budget: budgetPanel,
            members: membersPanel, settings: settingsPanel
        };
        for (let p in panels) panels[p].style.display = 'none';
        panels[activeTab].style.display = 'block';
        const btns = { years:tabYears, months:tabMonths, log:tabLog, analytics:tabAnalytics, goal:tabGoal, budget:tabBudget, members:tabMembers, settings:tabSettings };
        for (let p in btns) btns[p].classList.remove('btn-accent');
        btns[activeTab].classList.add('btn-accent');
        saveToLocalStorage();
    }

    // ======================== МОДАЛЬНЫЕ ОКНА ========================
    function openAddModal(type) {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.style.display = 'flex';
        const isIncome = type === 'income';
        modalDiv.innerHTML = `<div class="modal-card">
            <h3>${isIncome ? '➕ Добавить доход' : '➖ Расход'}</h3>
            <div class="form-group"><label>Сумма (₽)</label><input type="number" id="modalAmount" step="1" value="1000"></div>
            <div class="form-group"><label>Дата</label><input type="date" id="modalDate" value="${new Date().toISOString().slice(0,10)}"></div>
            <div class="form-group"><label>Категория</label><select id="modalCategory">${getCategoryOptions()}</select></div>
            <div class="form-group"><label>Участник</label><select id="modalMember">${appData.members.map(m=>`<option value="${m}">${m}</option>`).join('')}</select></div>
            <div class="form-group"><label>Комментарий</label><input type="text" id="modalDesc"></div>
            <div class="flex-row" style="justify-content:flex-end;"><button id="modalCancel" class="btn-outline">Отмена</button><button id="modalSave" class="btn-accent">Сохранить</button></div>
        </div>`;
        document.body.appendChild(modalDiv);
        document.getElementById('modalCancel').onclick = () => modalDiv.remove();
        document.getElementById('modalSave').onclick = () => {
            const amount = parseFloat(document.getElementById('modalAmount').value);
            if (isNaN(amount) || amount <= 0) { alert('Введите сумму >0'); return; }
            addTransaction(amount, type, document.getElementById('modalDate').value, document.getElementById('modalCategory').value, document.getElementById('modalMember').value, document.getElementById('modalDesc').value);
            modalDiv.remove();
        };
    }
    function openEditModal(id) {
        const txn = appData.transactions.find(t => t.id === id);
        if (!txn) return;
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.style.display = 'flex';
        modalDiv.innerHTML = `<div class="modal-card">
            <h3>✏️ Редактировать</h3>
            <div class="form-group"><label>Сумма (₽)</label><input type="number" id="modalAmount" step="1" value="${Math.abs(txn.amount)}"></div>
            <div class="form-group"><label>Дата</label><input type="date" id="modalDate" value="${txn.date}"></div>
            <div class="form-group"><label>Категория</label><select id="modalCategory">${getCategoryOptions(txn.category)}</select></div>
            <div class="form-group"><label>Участник</label><select id="modalMember">${appData.members.map(m=>`<option value="${m}" ${m===txn.member?'selected':''}>${m}</option>`).join('')}</select></div>
            <div class="form-group"><label>Комментарий</label><input type="text" id="modalDesc" value="${txn.description||''}"></div>
            <div class="flex-row" style="justify-content:flex-end;"><button id="modalCancel" class="btn-outline">Отмена</button><button id="modalSave" class="btn-accent">Сохранить</button></div>
        </div>`;
        document.body.appendChild(modalDiv);
        document.getElementById('modalCancel').onclick = () => modalDiv.remove();
        document.getElementById('modalSave').onclick = () => {
            const amount = parseFloat(document.getElementById('modalAmount').value);
            if (isNaN(amount) || amount <= 0) { alert('Введите сумму >0'); return; }
            const finalAmount = txn.amount > 0 ? amount : -amount;
            updateTransaction(id, {
                amount: finalAmount,
                date: document.getElementById('modalDate').value,
                category: document.getElementById('modalCategory').value,
                member: document.getElementById('modalMember').value,
                description: document.getElementById('modalDesc').value
            });
            modalDiv.remove();
        };
    }
    function getCategoryOptions(selected='') {
        const cats = ['💰 Зарплата','🎁 Подарок','🍔 Еда','🚗 Транспорт','🏠 Жильё','💊 Здоровье','🎉 Развлечения','📚 Образование','💼 Инвестиции','📦 Другое'];
        return cats.map(c => `<option value="${c}" ${c===selected?'selected':''}>${c}</option>`).join('');
    }

    // ======================== ЭКСПОРТ/ИМПОРТ ========================
    function exportToJson() {
        const dataStr = JSON.stringify(appData, null, 2);
        const blob = new Blob([dataStr], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `savings_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }
    function importFromJson(file) {
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const imported = JSON.parse(e.target.result);
                pushState();
                appData = imported;
                if (!appData.yearlyOverrides) appData.yearlyOverrides = {};
                saveToLocalStorage();
                renderAll();
                alert('Импорт успешен');
            } catch(err) { alert('Ошибка файла'); }
        };
        reader.readAsText(file);
    }

    // ======================== НАСТРОЙКИ ========================
    function toggleTheme() {
        appData.settings.darkMode = !appData.settings.darkMode;
        if (appData.settings.darkMode) document.body.classList.add('dark');
        else document.body.classList.remove('dark');
        saveToLocalStorage();
    }
    function requestNotificationPermission() {
        if ('Notification' in navigator) Notification.requestPermission();
    }

    // ======================== ИНИЦИАЛИЗАЦИЯ ========================
    function init() {
        loadFromLocalStorage();
        renderAll();

        themeToggle.onclick = toggleTheme;
        darkModeToggle.onclick = toggleTheme;
        openAddBtn.onclick = () => openAddModal('income');
        openExpenseBtn.onclick = () => openAddModal('expense');
        undoBtn.onclick = undo;
        redoBtn.onclick = redo;
        exportJsonBtn.onclick = exportToJson;
        importJsonBtn.onclick = () => importFileInput.click();
        importFileInput.onchange = e => { if (e.target.files[0]) importFromJson(e.target.files[0]); e.target.value = ''; };
        saveGoalBtn.onclick = () => {
            pushState();
            appData.goal = {
                name: goalName.value,
                target: parseFloat(goalTarget.value) || 0,
                date: goalDate.value,
                initial: parseFloat(goalInitial.value) || 0
            };
            saveToLocalStorage();
            renderAll();
        };
        setBudgetBtn.onclick = () => {
            const cat = budgetCategorySelect.value;
            const limit = parseFloat(budgetLimit.value);
            if (cat && !isNaN(limit) && limit > 0) {
                pushState();
                appData.budgets[cat] = limit;
                saveToLocalStorage();
                renderBudgets();
            } else alert('Выберите категорию и лимит');
        };
        addMemberBtn.onclick = () => {
            const name = newMemberName.value.trim();
            if (name && !appData.members.includes(name)) {
                pushState();
                appData.members.push(name);
                saveToLocalStorage();
                renderMembers();
                renderLog();
                newMemberName.value = '';
            }
        };
        requestNotifyBtn.onclick = requestNotificationPermission;
        globalPercent.onchange = () => {
            appData.settings.defaultInterest = parseFloat(globalPercent.value);
            saveToLocalStorage();
            renderYears();
        };
        document.querySelectorAll('input[name="interestType"]').forEach(r => r.onchange = () => {
            appData.settings.interestType = document.querySelector('input[name="interestType"]:checked').value;
            saveToLocalStorage();
            renderYears();
        });
        logSearch.oninput = renderLog;
        logTypeFilter.onchange = renderLog;
        logCategoryFilter.onchange = renderLog;
        logMemberFilter.onchange = renderLog;

        tabYears.onclick = () => { activeTab = 'years'; renderAll(); };
        tabMonths.onclick = () => { activeTab = 'months'; renderAll(); };
        tabLog.onclick = () => { activeTab = 'log'; renderAll(); };
        tabAnalytics.onclick = () => { activeTab = 'analytics'; renderAll(); };
        tabGoal.onclick = () => { activeTab = 'goal'; renderAll(); };
        tabBudget.onclick = () => { activeTab = 'budget'; renderAll(); };
        tabMembers.onclick = () => { activeTab = 'members'; renderAll(); };
        tabSettings.onclick = () => { activeTab = 'settings'; renderAll(); };
    }
    init();
</script>
</body>
</html>
