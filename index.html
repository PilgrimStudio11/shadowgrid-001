<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>P2P Messenger</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #app {
      width: 100%;
      max-width: 500px;
      height: 100%;
      background: #1f1f1f;
      display: flex;
      flex-direction: column;
      position: relative;
      border-radius: 24px;
      overflow: hidden;
    }
    .screen {
      display: none;
      flex-direction: column;
      height: 100%;
    }
    .screen.active {
      display: flex;
    }
    .chat-header {
      padding: 16px;
      background: #2c2c2e;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 0.5px solid #3a3a3c;
    }
    .back-btn, .call-btn {
      background: none;
      border: none;
      color: #007aff;
      font-size: 24px;
      cursor: pointer;
    }
    .contact-name {
      font-size: 18px;
      font-weight: 600;
      flex: 1;
    }
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .message {
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 18px;
      background: #2c2c2e;
      align-self: flex-start;
    }
    .message.own {
      background: #007aff;
      align-self: flex-end;
    }
    .message-text {
      font-size: 15px;
    }
    .message-time {
      font-size: 10px;
      color: #8e8e93;
      margin-top: 4px;
      text-align: right;
    }
    .input-area {
      padding: 12px;
      background: #2c2c2e;
      display: flex;
      gap: 8px;
      border-top: 0.5px solid #3a3a3c;
    }
    .input-area input {
      flex: 1;
      padding: 10px;
      border-radius: 24px;
      border: none;
      background: #3a3a3c;
      color: white;
      font-size: 16px;
    }
    .input-area button {
      background: #007aff;
      border: none;
      border-radius: 24px;
      padding: 0 16px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .auth-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 24px;
      gap: 20px;
    }
    .auth-container input {
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #2c2c2e;
      color: white;
      font-size: 16px;
    }
    .auth-container button {
      background: #007aff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    .auth-link {
      text-align: center;
      color: #007aff;
      cursor: pointer;
      margin-top: 8px;
    }
    .chat-list {
      flex: 1;
      overflow-y: auto;
    }
    .chat-item {
      background: #2c2c2e;
      padding: 12px 16px;
      margin: 4px 8px;
      border-radius: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .chat-item:active {
      background: #3a3a3c;
    }
    .chat-info {
      flex: 1;
    }
    .chat-name {
      font-weight: 500;
      margin-bottom: 4px;
    }
    .last-message {
      font-size: 12px;
      color: #8e8e93;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }
    .chat-status {
      font-size: 11px;
      color: #8e8e93;
    }
    .online-status {
      color: #34c759;
    }
    .delete-chat {
      background: #ff3b30;
      padding: 8px 16px;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      margin-left: 8px;
      cursor: pointer;
    }
    .add-contact-panel {
      margin: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .search-row {
      display: flex;
      gap: 8px;
    }
    .search-row input {
      flex: 1;
      padding: 12px;
      border-radius: 24px;
      border: none;
      background: #2c2c2e;
      color: white;
    }
    .search-row button {
      background: #007aff;
      border: none;
      border-radius: 24px;
      padding: 0 20px;
      font-weight: bold;
      color: white;
    }
    .qr-btn {
      background: #34c759;
      border: none;
      border-radius: 12px;
      padding: 12px;
      color: white;
      font-weight: bold;
      margin-top: 8px;
      cursor: pointer;
    }
    .video-call {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 1000;
      display: none;
      flex-direction: column;
    }
    .video-call.active {
      display: flex;
    }
    .remote-video {
      flex: 1;
      background: #000;
    }
    .remote-video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .local-video {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 120px;
      height: 160px;
      background: #333;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid white;
    }
    .local-video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .call-controls {
      position: absolute;
      bottom: 30px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 30px;
      background: rgba(0,0,0,0.6);
      padding: 12px;
    }
    .call-controls button {
      background: #ff3b30;
      border: none;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      font-size: 24px;
      color: white;
      cursor: pointer;
    }
    .qr-popup {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: white;
      padding: 12px;
      border-radius: 16px;
      z-index: 200;
      text-align: center;
    }
    .hidden {
      display: none;
    }
    .network-info {
      font-size: 12px;
      color: #8e8e93;
      padding: 8px 16px;
      background: #2c2c2e;
      text-align: center;
    }
  </style>
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
<div id="app">
  <!-- Экран входа -->
  <div id="loginScreen" class="screen active">
    <div class="auth-container">
      <h2 style="text-align:center">P2P Messenger</h2>
      <input type="text" id="loginUsername" placeholder="Логин (ник)">
      <input type="password" id="loginPassword" placeholder="Пароль">
      <button id="doLoginBtn">Войти</button>
      <div class="auth-link" id="showRegisterLink">Нет аккаунта? Зарегистрироваться</div>
      <button id="shareAppQRBtn" class="qr-btn">📲 Поделиться приложением (QR)</button>
    </div>
  </div>

  <!-- Экран регистрации -->
  <div id="registerScreen" class="screen">
    <div class="auth-container">
      <h2 style="text-align:center">Регистрация</h2>
      <input type="text" id="regUsername" placeholder="Логин (ник)">
      <input type="password" id="regPassword" placeholder="Пароль">
      <input type="password" id="regPasswordConfirm" placeholder="Подтвердите пароль">
      <button id="doRegisterBtn">Зарегистрироваться</button>
      <div class="auth-link" id="showLoginLink">Уже есть аккаунт? Войти</div>
    </div>
  </div>

  <!-- Главный экран (список чатов) -->
  <div id="mainScreen" class="screen">
    <div class="chat-header">
      <div style="flex:1; font-weight:600;">Чаты</div>
      <button id="showInstallQRBtn" style="background:none; border:none; color:#007aff; font-size:20px;">📱 QR</button>
    </div>
    <div class="network-info" id="networkInfo"></div>
    <div class="chat-list" id="chatList"></div>
    <div class="add-contact-panel">
      <div class="search-row">
        <input type="text" id="searchNick" placeholder="Поиск по нику...">
        <button id="searchBtn">Найти</button>
      </div>
    </div>
  </div>

  <!-- Экран чата -->
  <div id="chatScreen" class="screen">
    <div class="chat-header">
      <button class="back-btn" id="chatBackBtn">←</button>
      <div class="contact-name" id="chatContactName"></div>
      <div class="call-buttons">
        <button class="call-btn" id="audioCallBtn">📞</button>
        <button class="call-btn" id="videoCallBtn">📹</button>
      </div>
    </div>
    <div class="messages-container" id="messagesContainer"></div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Сообщение">
      <button id="sendMsgBtn">Отправить</button>
    </div>
  </div>

  <!-- Оверлей видеозвонка -->
  <div id="videoCallOverlay" class="video-call">
    <div class="remote-video"><video id="remoteVideo" autoplay playsinline></video></div>
    <div class="local-video"><video id="localVideo" autoplay playsinline muted></video></div>
    <div class="call-controls"><button id="hangupBtn">📞</button></div>
  </div>

  <div id="qrPopup" class="qr-popup hidden"></div>
</div>

<script>
  // ---------------------------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------------------------
  let currentUser = null;          // { username, peerId, encryptionKey }
  let chats = [];                  // { peerId, username, encryptionKey, peer, online, lastSeen, unread }
  let messages = {};               // peerId -> [{text, own, time, delivered}]
  let pendingMessages = [];        // сообщения для офлайн-контактов
  let currentChatPeerId = null;
  let currentCall = null;
  let localStream = null;
  let peer = null;

  // ---------------------------- КРИПТОГРАФИЯ ----------------------------
  function deriveKeyFromPassword(password, salt) {
    return CryptoJS.PBKDF2(password, salt, { keySize: 256/32, iterations: 10000 }).toString();
  }
  function encryptMessage(text, keyHex) {
    const iv = CryptoJS.lib.WordArray.random(16);
    const encrypted = CryptoJS.AES.encrypt(text, CryptoJS.enc.Hex.parse(keyHex), { iv: iv });
    return iv.toString() + ':' + encrypted.toString();
  }
  function decryptMessage(cipherText, keyHex) {
    try {
      const parts = cipherText.split(':');
      const iv = CryptoJS.enc.Hex.parse(parts[0]);
      const encrypted = parts.slice(1).join(':');
      const decrypted = CryptoJS.AES.decrypt(encrypted, CryptoJS.enc.Hex.parse(keyHex), { iv: iv });
      return decrypted.toString(CryptoJS.enc.Utf8);
    } catch(e) { return "⚠️ Ошибка"; }
  }

  // ---------------------------- ХРАНЕНИЕ ДАННЫХ ПОЛЬЗОВАТЕЛЯ (ЧАТЫ, СООБЩЕНИЯ) ----------------------------
  function saveUserData() {
    if (!currentUser) return;
    const data = {
      username: currentUser.username,
      peerId: currentUser.peerId,
      encryptionKey: currentUser.encryptionKey,
      chats: chats.map(c => ({ peerId: c.peerId, username: c.username, encryptionKey: c.encryptionKey })),
      messages: messages
    };
    localStorage.setItem('p2p_user_data', JSON.stringify(data));
  }
  function loadUserData() {
    const raw = localStorage.getItem('p2p_user_data');
    if (!raw) return null;
    try { return JSON.parse(raw); } catch(e) { return null; }
  }

  // ---------------------------- РЕГИСТРАЦИЯ И ВХОД (исправленные) ----------------------------
  function registerUser(username, password, passwordConfirm) {
    if (password !== passwordConfirm) {
      alert('Пароли не совпадают');
      return false;
    }
    if (username.length < 3) {
      alert('Логин должен быть не менее 3 символов');
      return false;
    }
    if (password.length < 4) {
      alert('Пароль должен быть не менее 4 символов');
      return false;
    }
    // Проверяем, нет ли уже зарегистрированного пользователя с таким логином на этом устройстве
    const existingAuth = localStorage.getItem('p2p_auth_' + username);
    if (existingAuth) {
      alert('Пользователь с таким логином уже зарегистрирован на этом устройстве');
      return false;
    }
    // Генерируем соль и ключ
    const salt = CryptoJS.lib.WordArray.random(16).toString();
    const encryptionKey = deriveKeyFromPassword(password, salt);
    const peerId = 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2);
    const passwordHash = CryptoJS.SHA256(password).toString();
    // Сохраняем данные авторизации отдельно по логину
    const authData = {
      username: username,
      passwordHash: passwordHash,
      salt: salt,
      peerId: peerId,
      encryptionKey: encryptionKey
    };
    localStorage.setItem('p2p_auth_' + username, JSON.stringify(authData));
    // Сразу устанавливаем текущего пользователя
    currentUser = {
      username: username,
      peerId: peerId,
      encryptionKey: encryptionKey
    };
    // Очищаем старые чаты (новый пользователь)
    chats = [];
    messages = {};
    pendingMessages = [];
    saveUserData();
    alert('Регистрация успешна!');
    return true;
  }

  function loginUser(username, password) {
    const authKey = 'p2p_auth_' + username;
    const storedAuth = localStorage.getItem(authKey);
    if (!storedAuth) {
      alert('Пользователь не зарегистрирован');
      return false;
    }
    const authData = JSON.parse(storedAuth);
    const inputHash = CryptoJS.SHA256(password).toString();
    if (authData.passwordHash !== inputHash) {
      alert('Неверный пароль');
      return false;
    }
    // Вход успешен
    currentUser = {
      username: authData.username,
      peerId: authData.peerId,
      encryptionKey: authData.encryptionKey
    };
    // Загружаем чаты и сообщения, если есть
    const savedData = loadUserData();
    if (savedData && savedData.username === currentUser.username) {
      chats = savedData.chats.map(c => ({ ...c, peer: null, online: false, lastSeen: 0, unread: 0 }));
      messages = savedData.messages;
    } else {
      chats = [];
      messages = {};
    }
    pendingMessages = [];
    alert('Вход выполнен');
    return true;
  }

  // ---------------------------- P2P ИНИЦИАЛИЗАЦИЯ ----------------------------
  function initPeer() {
    return new Promise((resolve, reject) => {
      const peerId = currentUser.peerId;
      peer = new Peer(peerId, {
        host: '0.peerjs.com',
        port: 443,
        path: '/',
        secure: true,
        debug: 2
      });
      peer.on('open', () => {
        console.log('PeerJS open:', peerId);
        resolve();
      });
      peer.on('error', (err) => {
        console.error('PeerJS error', err);
        reject(err);
      });
      peer.on('connection', (conn) => {
        let chat = chats.find(c => c.peerId === conn.peer);
        if (!chat) {
          // Новый контакт – ждём handshake
          conn.on('data', (data) => {
            const msg = JSON.parse(data);
            if (msg.type === 'handshake') {
              chat = {
                peerId: conn.peer,
                username: msg.username,
                encryptionKey: msg.encryptionKey,
                peer: conn,
                online: true,
                lastSeen: Date.now(),
                unread: 0
              };
              chats.push(chat);
              saveUserData();
              setupConnection(conn, chat);
              conn.send(JSON.stringify({ type: 'handshake_ack', encryptionKey: currentUser.encryptionKey }));
              renderChatList();
              flushPendingMessages(chat);
            }
          });
        } else {
          chat.peer = conn;
          chat.online = true;
          chat.lastSeen = Date.now();
          setupConnection(conn, chat);
          conn.send(JSON.stringify({ type: 'handshake', username: currentUser.username, encryptionKey: currentUser.encryptionKey }));
          flushPendingMessages(chat);
          renderChatList();
        }
      });
    });
  }

  function setupConnection(conn, chat) {
    conn.on('data', (data) => {
      const packet = JSON.parse(data);
      if (packet.type === 'chat') {
        const decrypted = decryptMessage(packet.cipher, chat.encryptionKey);
        if (!messages[chat.peerId]) messages[chat.peerId] = [];
        messages[chat.peerId].push({ text: decrypted, own: false, time: new Date().toLocaleTimeString(), delivered: true });
        chat.unread = (chat.unread || 0) + 1;
        saveUserData();
        if (currentChatPeerId === chat.peerId) renderMessages();
        renderChatList();
        showNotification(chat.username, decrypted);
      } else if (packet.type === 'handshake_ack') {
        chat.encryptionKey = packet.encryptionKey;
        saveUserData();
      } else if (packet.type === 'search_request') {
        handleSearchRequest(conn, packet);
      } else if (packet.type === 'search_response') {
        handleSearchResponse(packet);
      } else if (packet.type === 'call_offer') {
        handleIncomingCall(conn, packet);
      } else if (packet.type === 'call_candidate') {
        if (currentCall) currentCall.pc.addIceCandidate(new RTCIceCandidate(packet.candidate));
      }
    });
    conn.on('close', () => {
      chat.online = false;
      chat.lastSeen = Date.now();
      renderChatList();
      if (currentChatPeerId === chat.peerId) {
        document.getElementById('chatContactName').innerHTML = `${chat.username} <span style="font-size:12px; color:#8e8e93;">был(а) ${new Date(chat.lastSeen).toLocaleTimeString()}</span>`;
      }
    });
  }

  // ---------------------------- ПОИСК КОНТАКТОВ ----------------------------
  function searchContact(nick) {
    let sent = false;
    for (let chat of chats) {
      if (chat.peer && chat.peer.open) {
        chat.peer.send(JSON.stringify({
          type: 'search_request',
          nick: nick,
          from: currentUser.peerId
        }));
        sent = true;
      }
    }
    if (!sent) {
      alert('Нет активных контактов для поиска. Добавьте кого-нибудь вручную или подождите.');
    }
    window.searchResultReceived = false;
    setTimeout(() => {
      if (!window.searchResultReceived) {
        alert('Пользователь не найден в сети');
      }
    }, 3000);
  }

  function handleSearchRequest(conn, packet) {
    if (currentUser.username.toLowerCase() === packet.nick.toLowerCase()) {
      conn.send(JSON.stringify({
        type: 'search_response',
        peerId: currentUser.peerId,
        username: currentUser.username,
        requester: packet.from
      }));
    }
  }

  function handleSearchResponse(packet) {
    window.searchResultReceived = true;
    if (packet.peerId === currentUser.peerId) return;
    let existing = chats.find(c => c.peerId === packet.peerId);
    if (!existing) {
      const newChat = {
        peerId: packet.peerId,
        username: packet.username,
        encryptionKey: CryptoJS.lib.WordArray.random(32).toString(),
        peer: null,
        online: false,
        lastSeen: 0,
        unread: 0
      };
      chats.push(newChat);
      saveUserData();
      renderChatList();
      connectToPeer(newChat);
      alert(`Контакт ${packet.username} добавлен`);
    } else {
      alert(`${packet.username} уже в ваших контактах`);
    }
  }

  function connectToPeer(chat) {
    if (chat.peer) return;
    const conn = peer.connect(chat.peerId);
    conn.on('open', () => {
      chat.peer = conn;
      chat.online = true;
      chat.lastSeen = Date.now();
      setupConnection(conn, chat);
      conn.send(JSON.stringify({ type: 'handshake', username: currentUser.username, encryptionKey: currentUser.encryptionKey }));
      renderChatList();
      flushPendingMessages(chat);
    });
    conn.on('close', () => {
      chat.online = false;
      chat.lastSeen = Date.now();
      renderChatList();
    });
  }

  function flushPendingMessages(chat) {
    if (!chat.peer || !chat.peer.open) return;
    const pending = pendingMessages.filter(m => m.peerId === chat.peerId);
    for (let p of pending) {
      sendChatMessageDirect(chat, p.text);
    }
    pendingMessages = pendingMessages.filter(m => m.peerId !== chat.peerId);
  }

  // ---------------------------- ОТПРАВКА СООБЩЕНИЙ ----------------------------
  function sendChatMessage(chat, text) {
    if (!chat.peer || !chat.peer.open) {
      pendingMessages.push({ peerId: chat.peerId, text });
      if (!messages[chat.peerId]) messages[chat.peerId] = [];
      messages[chat.peerId].push({ text, own: true, time: new Date().toLocaleTimeString(), delivered: false });
      saveUserData();
      renderMessages();
      renderChatList();
      alert('Сообщение будет доставлено, когда контакт появится в сети');
      return;
    }
    sendChatMessageDirect(chat, text);
  }

  function sendChatMessageDirect(chat, text) {
    const cipher = encryptMessage(text, chat.encryptionKey);
    chat.peer.send(JSON.stringify({ type: 'chat', cipher: cipher, msgId: Date.now() }));
    if (!messages[chat.peerId]) messages[chat.peerId] = [];
    messages[chat.peerId].push({ text, own: true, time: new Date().toLocaleTimeString(), delivered: true });
    saveUserData();
    renderMessages();
    renderChatList();
  }

  // ---------------------------- ЗВОНКИ (упрощённо, но рабочие) ----------------------------
  async function startCall(video) {
    if (!currentChatPeerId) return;
    const chat = chats.find(c => c.peerId === currentChatPeerId);
    if (!chat || !chat.peer) return;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: video, audio: true });
      localStream = stream;
      document.getElementById('localVideo').srcObject = stream;
      const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      stream.getTracks().forEach(track => pc.addTrack(track, stream));
      pc.onicecandidate = event => {
        if (event.candidate) {
          chat.peer.send(JSON.stringify({ type: 'call_candidate', candidate: event.candidate }));
        }
      };
      pc.ontrack = event => {
        document.getElementById('remoteVideo').srcObject = event.streams[0];
      };
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      chat.peer.send(JSON.stringify({ type: 'call_offer', sdp: pc.localDescription }));
      currentCall = { pc, chat };
      document.getElementById('videoCallOverlay').classList.add('active');
    } catch(e) {
      alert('Не удалось получить доступ к камере/микрофону');
    }
  }

  function handleIncomingCall(conn, packet) {
    if (currentCall) {
      conn.send(JSON.stringify({ type: 'call_busy' }));
      return;
    }
    const accept = confirm('Входящий звонок. Принять?');
    if (!accept) return;
    navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
      localStream = stream;
      document.getElementById('localVideo').srcObject = stream;
      const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      stream.getTracks().forEach(track => pc.addTrack(track, stream));
      pc.onicecandidate = event => {
        if (event.candidate) {
          conn.send(JSON.stringify({ type: 'call_candidate', candidate: event.candidate }));
        }
      };
      pc.ontrack = event => {
        document.getElementById('remoteVideo').srcObject = event.streams[0];
      };
      pc.setRemoteDescription(new RTCSessionDescription(packet.sdp));
      pc.createAnswer().then(answer => {
        pc.setLocalDescription(answer);
        conn.send(JSON.stringify({ type: 'call_answer', sdp: pc.localDescription }));
      });
      currentCall = { pc, chat: chats.find(c => c.peer === conn) };
      document.getElementById('videoCallOverlay').classList.add('active');
    });
  }

  function endCall() {
    if (currentCall) {
      currentCall.pc.close();
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      localStream = null;
      currentCall = null;
    }
    document.getElementById('videoCallOverlay').classList.remove('active');
  }

  // ---------------------------- UI РЕНДЕРИНГ ----------------------------
  function renderChatList() {
    const container = document.getElementById('chatList');
    container.innerHTML = '';
    for (let chat of chats) {
      const lastMsg = messages[chat.peerId] ? messages[chat.peerId][messages[chat.peerId].length-1] : null;
      const statusText = chat.online ? '🟢 в сети' : `был(а) ${new Date(chat.lastSeen).toLocaleTimeString()}`;
      const div = document.createElement('div');
      div.className = 'chat-item';
      div.innerHTML = `
        <div class="chat-info" style="flex:1">
          <div class="chat-name">${escapeHtml(chat.username)} ${chat.unread ? `<span style="background:#007aff; border-radius:12px; padding:2px 8px; font-size:12px;">${chat.unread}</span>` : ''}</div>
          <div class="last-message">${lastMsg ? escapeHtml(lastMsg.text.substring(0,30)) : 'Нет сообщений'}</div>
          <div class="chat-status ${chat.online ? 'online-status' : ''}">${statusText}</div>
        </div>
        <div class="delete-chat" data-peer="${chat.peerId}">🗑️</div>
      `;
      div.querySelector('.chat-info').onclick = () => openChat(chat);
      const delBtn = div.querySelector('.delete-chat');
      delBtn.onclick = (e) => {
        e.stopPropagation();
        if (confirm('Удалить чат? Все сообщения будут стёрты.')) {
          deleteChat(chat.peerId);
        }
      };
      container.appendChild(div);
    }
    if (chats.length === 0) {
      container.innerHTML = '<div style="text-align:center; padding:20px;">Нет чатов. Найдите собеседника по нику.</div>';
    }
  }

  function deleteChat(peerId) {
    chats = chats.filter(c => c.peerId !== peerId);
    delete messages[peerId];
    saveUserData();
    if (currentChatPeerId === peerId) {
      document.getElementById('chatScreen').classList.remove('active');
      document.getElementById('mainScreen').classList.add('active');
      currentChatPeerId = null;
    }
    renderChatList();
  }

  function openChat(chat) {
    currentChatPeerId = chat.peerId;
    document.getElementById('chatContactName').innerHTML = `${escapeHtml(chat.username)} <span style="font-size:12px; color:#8e8e93;">${chat.online ? 'в сети' : 'был(а) ' + new Date(chat.lastSeen).toLocaleTimeString()}</span>`;
    renderMessages();
    chat.unread = 0;
    saveUserData();
    renderChatList();
    document.getElementById('mainScreen').classList.remove('active');
    document.getElementById('chatScreen').classList.add('active');
  }

  function renderMessages() {
    const container = document.getElementById('messagesContainer');
    container.innerHTML = '';
    const msgs = messages[currentChatPeerId] || [];
    msgs.forEach(msg => {
      const div = document.createElement('div');
      div.className = `message ${msg.own ? 'own' : ''}`;
      div.innerHTML = `<div class="message-text">${escapeHtml(msg.text)}</div><div class="message-time">${msg.time}</div>`;
      container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
  }

  function showNotification(title, body) {
    if (Notification.permission === 'granted' && document.hidden && navigator.serviceWorker) {
      navigator.serviceWorker.ready.then(reg => reg.showNotification(title, { body, icon: 'icon.png' }));
    }
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
  }

  // ---------------------------- УСТАНОВКА PWA И QR ----------------------------
  function showInstallQR() {
    const installUrl = window.location.href;
    const qrDiv = document.getElementById('qrPopup');
    qrDiv.innerHTML = '';
    new QRCode(qrDiv, { text: installUrl, width: 200, height: 200 });
    qrDiv.classList.remove('hidden');
    setTimeout(() => qrDiv.classList.add('hidden'), 30000);
  }

  function shareAppViaQR() {
    showInstallQR();
  }

  // ---------------------------- ЗАПУСК ПРИЛОЖЕНИЯ ПОСЛЕ АВТОРИЗАЦИИ ----------------------------
  async function startAppAfterAuth() {
    try {
      await initPeer();
      for (let chat of chats) {
        connectToPeer(chat);
      }
      renderChatList();
      document.getElementById('loginScreen').classList.remove('active');
      document.getElementById('registerScreen').classList.remove('active');
      document.getElementById('mainScreen').classList.add('active');
      document.getElementById('networkInfo').innerText = `Ваш ID: ${currentUser.peerId.slice(0,12)}...`;
    } catch(e) {
      alert('Ошибка подключения к сети: ' + e.message);
    }
  }

  // ---------------------------- ОБРАБОТЧИКИ UI ----------------------------
  document.getElementById('doLoginBtn').onclick = async () => {
    const user = document.getElementById('loginUsername').value.trim();
    const pass = document.getElementById('loginPassword').value;
    if (!user || !pass) {
      alert('Введите логин и пароль');
      return;
    }
    if (loginUser(user, pass)) {
      await startAppAfterAuth();
    }
  };
  document.getElementById('doRegisterBtn').onclick = async () => {
    const user = document.getElementById('regUsername').value.trim();
    const pass = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regPasswordConfirm').value;
    if (!user || !pass || !confirm) {
      alert('Заполните все поля');
      return;
    }
    if (registerUser(user, pass, confirm)) {
      await startAppAfterAuth();
    }
  };
  document.getElementById('showRegisterLink').onclick = () => {
    document.getElementById('loginScreen').classList.remove('active');
    document.getElementById('registerScreen').classList.add('active');
  };
  document.getElementById('showLoginLink').onclick = () => {
    document.getElementById('registerScreen').classList.remove('active');
    document.getElementById('loginScreen').classList.add('active');
  };
  document.getElementById('searchBtn').onclick = () => {
    const nick = document.getElementById('searchNick').value.trim();
    if (nick) searchContact(nick);
  };
  document.getElementById('sendMsgBtn').onclick = () => {
    const text = document.getElementById('messageInput').value;
    if (!text || !currentChatPeerId) return;
    const chat = chats.find(c => c.peerId === currentChatPeerId);
    if (chat) sendChatMessage(chat, text);
    document.getElementById('messageInput').value = '';
  };
  document.getElementById('chatBackBtn').onclick = () => {
    document.getElementById('chatScreen').classList.remove('active');
    document.getElementById('mainScreen').classList.add('active');
    currentChatPeerId = null;
  };
  document.getElementById('audioCallBtn').onclick = () => startCall(false);
  document.getElementById('videoCallBtn').onclick = () => startCall(true);
  document.getElementById('hangupBtn').onclick = () => endCall();
  document.getElementById('showInstallQRBtn').onclick = () => showInstallQR();
  document.getElementById('shareAppQRBtn').onclick = () => shareAppViaQR();
