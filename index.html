<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>P2P Mesh</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    body { background: #0a0a0a; color: #e0e0e0; height: 100vh; display: flex; justify-content: center; align-items: center; }
    #app { width: 100%; max-width: 500px; height: 100%; background: #1f1f1f; display: flex; flex-direction: column; position: relative; border-radius: 24px; overflow: hidden; }
    .screen { display: none; flex-direction: column; height: 100%; }
    .screen.active { display: flex; }
    .chat-header { padding: 16px; background: #2c2c2e; display: flex; align-items: center; gap: 12px; border-bottom: 0.5px solid #3a3a3c; }
    .back-btn, .call-btn { background: none; border: none; color: #007aff; font-size: 24px; cursor: pointer; }
    .contact-name { font-size: 18px; font-weight: 600; flex: 1; }
    .messages-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .message { max-width: 80%; padding: 8px 12px; border-radius: 18px; background: #2c2c2e; align-self: flex-start; }
    .message.own { background: #007aff; align-self: flex-end; }
    .message-text { font-size: 15px; }
    .message-time { font-size: 10px; color: #8e8e93; margin-top: 4px; text-align: right; }
    .input-area { padding: 12px; background: #2c2c2e; display: flex; gap: 8px; border-top: 0.5px solid #3a3a3c; }
    .input-area input { flex: 1; padding: 10px; border-radius: 24px; border: none; background: #3a3a3c; color: white; font-size: 16px; }
    .input-area button { background: #007aff; border: none; border-radius: 24px; padding: 0 16px; color: white; font-weight: 600; cursor: pointer; }
    .auth-container { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 24px; gap: 20px; }
    .auth-container input { padding: 14px; border-radius: 12px; border: none; background: #2c2c2e; color: white; font-size: 16px; }
    .auth-container button { background: #007aff; border: none; border-radius: 12px; padding: 14px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
    .contact-list { flex: 1; overflow-y: auto; padding: 16px; }
    .contact-item { background: #2c2c2e; padding: 12px; border-radius: 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .online-badge { width: 10px; height: 10px; border-radius: 10px; background: #34c759; margin-left: 8px; display: inline-block; }
    .add-contact { margin: 16px; display: flex; flex-direction: column; gap: 8px; }
    .add-contact input { padding: 12px; border-radius: 24px; border: none; background: #2c2c2e; color: white; }
    .add-contact button { background: #007aff; border: none; border-radius: 24px; padding: 12px; font-weight: bold; }
    .video-call { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; display: none; flex-direction: column; }
    .video-call.active { display: flex; }
    .remote-video { flex: 1; background: #000; }
    .remote-video video { width: 100%; height: 100%; object-fit: cover; }
    .local-video { position: absolute; bottom: 20px; right: 20px; width: 120px; height: 160px; background: #333; border-radius: 12px; overflow: hidden; border: 2px solid white; }
    .local-video video { width: 100%; height: 100%; object-fit: cover; }
    .call-controls { position: absolute; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; gap: 30px; background: rgba(0,0,0,0.6); padding: 12px; }
    .call-controls button { background: #ff3b30; border: none; border-radius: 50%; width: 60px; height: 60px; font-size: 24px; color: white; cursor: pointer; }
    .qr-popup { position: fixed; bottom: 20px; left: 20px; background: white; padding: 12px; border-radius: 16px; z-index: 200; text-align: center; max-width: 260px; }
    .qr-popup canvas, .qr-popup img { width: 200px; height: 200px; }
    .share-btn { background: #34c759; border: none; border-radius: 12px; padding: 12px; color: white; font-weight: bold; margin-top: 8px; cursor: pointer; }
    .hidden { display: none; }
    .network-info { font-size: 12px; color: #8e8e93; padding: 8px 16px; background: #2c2c2e; text-align: center; }
    .tab-bar { display: flex; background: #2c2c2e; border-top: 0.5px solid #3a3a3c; }
    .tab { flex: 1; text-align: center; padding: 12px; color: #8e8e93; font-weight: 500; cursor: pointer; }
    .tab.active { color: #007aff; border-bottom: 2px solid #007aff; }
    .button-row { display: flex; gap: 8px; margin-top: 8px; }
    .button-row button { flex: 1; }
  </style>
  <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
<div id="app">
  <!-- Экран авторизации -->
  <div id="authScreen" class="screen active">
    <div class="auth-container">
      <h2 style="text-align:center">P2P Mesh</h2>
      <input type="text" id="loginUsername" placeholder="Ваш ник">
      <input type="password" id="loginPassword" placeholder="Пароль">
      <button id="loginBtn">Войти / Создать</button>
      <div style="font-size:12px; color:#8e8e93; text-align:center;">Пароль остаётся на устройстве</div>
      <button id="shareFileBtn" class="share-btn">📲 Поделиться приложением (AirDrop)</button>
    </div>
  </div>

  <!-- Главный экран -->
  <div id="mainScreen" class="screen">
    <div class="chat-header">
      <div style="flex:1; font-weight:600;">Моя сеть</div>
      <button id="shareAppBtn" class="share-btn">📲 Поделиться приложением</button>
    </div>
    <div class="network-info" id="networkInfo"></div>
    <div class="tab-bar">
      <div class="tab active" data-tab="chats">Чаты</div>
      <div class="tab" data-tab="contacts">Контакты</div>
    </div>
    <div id="chatsList" class="contact-list"></div>
    <div id="contactsList" class="contact-list hidden"></div>
    <div class="add-contact" id="addContactPanel">
      <input type="text" id="searchNickInput" placeholder="Поиск по нику (Telegram-style)">
      <button id="searchContactBtn">🔍 Найти</button>
      <div class="button-row">
        <button id="generateOfferBtn" class="share-btn">📡 Мой QR-оффер</button>
        <button id="addManualBtn" class="share-btn">➕ Добавить вручную</button>
      </div>
    </div>
  </div>

  <!-- Экран чата -->
  <div id="chatScreen" class="screen">
    <div class="chat-header">
      <button class="back-btn" id="chatBackBtn">←</button>
      <div class="contact-name" id="chatContactName"></div>
      <div class="call-buttons">
        <button class="call-btn" id="audioCallBtn">📞</button>
        <button class="call-btn" id="videoCallBtn">📹</button>
      </div>
    </div>
    <div class="messages-container" id="messagesContainer"></div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Сообщение">
      <button id="sendMsgBtn">Отправить</button>
    </div>
  </div>

  <!-- Оверлей видеозвонка -->
  <div id="videoCallOverlay" class="video-call">
    <div class="remote-video"><video id="remoteVideo" autoplay playsinline></video></div>
    <div class="local-video"><video id="localVideo" autoplay playsinline muted></video></div>
    <div class="call-controls"><button id="hangupBtn">📞</button></div>
  </div>

  <div id="qrPopup" class="qr-popup hidden"></div>
</div>

<script>
  // ---------------------------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------------------------
  let currentUser = null;
  let contacts = [];        // { peerId, username, encryptionKey, peerInstance, online }
  let activeContactId = null;
  let messages = {};
  let currentCall = null;
  let localStream = null;
  
  // Распределённая таблица логинов (peerId → username), которую каждый узел хранит и синхронизирует
  let loginRegistry = {};   // username -> peerId
  let pendingSearchCallbacks = {}; // для ответов на поиск

  // ---------------------------- КРИПТОГРАФИЯ ----------------------------
  function deriveKeyFromPassword(password, salt) {
    return CryptoJS.PBKDF2(password, salt, { keySize: 256/32, iterations: 10000 }).toString();
  }
  function encryptMessage(text, keyHex) {
    const iv = CryptoJS.lib.WordArray.random(16);
    const encrypted = CryptoJS.AES.encrypt(text, CryptoJS.enc.Hex.parse(keyHex), { iv: iv });
    return iv.toString() + ':' + encrypted.toString();
  }
  function decryptMessage(cipherText, keyHex) {
    try {
      const parts = cipherText.split(':');
      const iv = CryptoJS.enc.Hex.parse(parts[0]);
      const encrypted = parts.slice(1).join(':');
      const decrypted = CryptoJS.AES.decrypt(encrypted, CryptoJS.enc.Hex.parse(keyHex), { iv: iv });
      return decrypted.toString(CryptoJS.enc.Utf8);
    } catch(e) { return "⚠️ Ошибка расшифровки"; }
  }

  // ---------------------------- ХРАНЕНИЕ ----------------------------
  function saveUserData() {
    if (!currentUser) return;
    const data = {
      username: currentUser.username,
      peerId: currentUser.peerId,
      encryptionKey: currentUser.encryptionKey,
      contacts: contacts.map(c => ({ peerId: c.peerId, username: c.username, encryptionKey: c.encryptionKey })),
      messages: messages,
      loginRegistry: loginRegistry
    };
    localStorage.setItem('p2pmesh_user', JSON.stringify(data));
  }
  function loadUserData() {
    const raw = localStorage.getItem('p2pmesh_user');
    if (!raw) return null;
    try { return JSON.parse(raw); } catch(e) { return null; }
  }

  // ---------------------------- P2P СОЕДИНЕНИЕ ----------------------------
  function createPeer(initiator, targetContact, offerSignal = null) {
    const peer = new SimplePeer({
      initiator: initiator,
      trickle: false,
      config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
    });
    peer.on('signal', data => {
      if (initiator) {
        const offerJson = JSON.stringify(data);
        showQR(offerJson, "Ваш QR-оффер для контакта");
      } else {
        const answerJson = JSON.stringify(data);
        showQR(answerJson, "Ответ для контакта");
      }
    });
    peer.on('connect', () => {
      targetContact.peerInstance = peer;
      targetContact.online = true;
      // Отправляем handshake
      peer.send(JSON.stringify({
        type: 'handshake',
        username: currentUser.username,
        encryptionKey: currentUser.encryptionKey
      }));
      renderContactList();
      // Синхронизируем локальную таблицу логинов с новым контактом
      syncRegistryToPeer(peer);
    });
    peer.on('data', data => handlePeerData(peer, targetContact, data));
    peer.on('close', () => {
      targetContact.online = false;
      renderContactList();
    });
    peer.on('error', err => console.error(err));
    if (!initiator && offerSignal) peer.signal(offerSignal);
    return peer;
  }

  function handlePeerData(peer, contact, rawData) {
    try {
      const packet = JSON.parse(rawData);
      if (packet.type === 'handshake') {
        contact.encryptionKey = packet.encryptionKey;
        contact.username = packet.username;
        // Добавляем в реестр
        if (!loginRegistry[packet.username] || loginRegistry[packet.username] === contact.peerId) {
          loginRegistry[packet.username] = contact.peerId;
        }
        saveUserData();
        renderContactList();
        peer.send(JSON.stringify({ type: 'handshake_ack', encryptionKey: currentUser.encryptionKey }));
        // Отправляем текущий реестр
        syncRegistryToPeer(peer);
      } else if (packet.type === 'handshake_ack') {
        contact.encryptionKey = packet.encryptionKey;
        saveUserData();
      } else if (packet.type === 'chat') {
        const decrypted = decryptMessage(packet.cipher, contact.encryptionKey);
        if (!messages[contact.peerId]) messages[contact.peerId] = [];
        messages[contact.peerId].push({ text: decrypted, own: false, time: new Date().toLocaleTimeString() });
        saveUserData();
        if (activeContactId === contact.peerId) renderMessages();
        showNotification(contact.username, decrypted);
      } else if (packet.type === 'call_offer') {
        handleIncomingCall(peer, packet);
      } else if (packet.type === 'registry_sync') {
        // Получаем часть реестра от другого узла
        for (let [uname, pId] of Object.entries(packet.registry)) {
          if (!loginRegistry[uname] || loginRegistry[uname] === pId) {
            loginRegistry[uname] = pId;
          }
        }
        saveUserData();
      } else if (packet.type === 'search_request') {
        // Запрос на поиск логина
        const { nick, requestId } = packet;
        let foundPeerId = loginRegistry[nick];
        if (foundPeerId) {
          peer.send(JSON.stringify({
            type: 'search_response',
            requestId: requestId,
            peerId: foundPeerId,
            username: nick
          }));
        }
      } else if (packet.type === 'search_response') {
        if (pendingSearchCallbacks[packet.requestId]) {
          pendingSearchCallbacks[packet.requestId](packet);
          delete pendingSearchCallbacks[packet.requestId];
        }
      } else if (packet.type === 'register_check') {
        // Проверка уникальности логина при регистрации
        const { username, requestId } = packet;
        let taken = !!loginRegistry[username];
        peer.send(JSON.stringify({
          type: 'register_response',
          requestId: requestId,
          available: !taken
        }));
      } else if (packet.type === 'register_response') {
        if (pendingSearchCallbacks[packet.requestId]) {
          pendingSearchCallbacks[packet.requestId](packet);
          delete pendingSearchCallbacks[packet.requestId];
        }
      }
    } catch(e) { console.error(e); }
  }

  function syncRegistryToPeer(peer) {
    // Отправляем не весь реестр, а только часть, чтобы не перегружать
    let subset = {};
    let count = 0;
    for (let [uname, pId] of Object.entries(loginRegistry)) {
      if (count++ > 50) break;
      subset[uname] = pId;
    }
    peer.send(JSON.stringify({ type: 'registry_sync', registry: subset }));
  }

  // ---------------------------- УПРАВЛЕНИЕ КОНТАКТАМИ ----------------------------
  function connectToPeer(contact) {
    if (contact.peerInstance) return;
    const peer = createPeer(true, contact);
    contact.peerInstance = peer;
  }

  function generateOfferForNewContact() {
    const tempPeer = new SimplePeer({ initiator: true, trickle: false });
    tempPeer.on('signal', data => {
      const offerJson = JSON.stringify(data);
      showQR(offerJson, "QR-оффер для нового контакта");
      setTimeout(() => {
        const answer = prompt("После сканирования вставьте ответ от другого устройства:");
        if (answer) {
          try {
            const answerSignal = JSON.parse(answer);
            tempPeer.signal(answerSignal);
            const newPeerId = 'peer_' + Date.now() + '_' + Math.random();
            const newContact = {
              peerId: newPeerId,
              username: 'Новый контакт',
              encryptionKey: CryptoJS.lib.WordArray.random(32).toString(),
              peerInstance: tempPeer,
              online: true
            };
            contacts.push(newContact);
            saveUserData();
            renderContactList();
            tempPeer.on('data', d => handlePeerData(tempPeer, newContact, d));
          } catch(e) { alert('Неверный ответ'); }
        }
      }, 100);
    });
  }

  function addContactManually() {
    const peerId = prompt("Введите PeerId контакта:");
    if (!peerId) return;
    if (contacts.find(c => c.peerId === peerId)) {
      alert('Контакт уже есть');
      return;
    }
    const newContact = {
      peerId: peerId,
      username: peerId.slice(0, 12),
      encryptionKey: CryptoJS.lib.WordArray.random(32).toString(),
      peerInstance: null,
      online: false
    };
    contacts.push(newContact);
    connectToPeer(newContact);
    saveUserData();
    renderContactList();
  }

  // Поиск по нику через сеть (gossip)
  function searchContactByNick(nick) {
    // Сначала проверим локальный реестр
    if (loginRegistry[nick]) {
      let peerId = loginRegistry[nick];
      if (contacts.find(c => c.peerId === peerId)) {
        openChat(contacts.find(c => c.peerId === peerId));
        return;
      } else {
        // Добавляем контакт
        let newContact = {
          peerId: peerId,
          username: nick,
          encryptionKey: CryptoJS.lib.WordArray.random(32).toString(),
          peerInstance: null,
          online: false
        };
        contacts.push(newContact);
        connectToPeer(newContact);
        saveUserData();
        renderContactList();
        alert(`Контакт ${nick} добавлен`);
        return;
      }
    }
    // Иначе отправляем запрос всем онлайн-контактам
    let requestId = Date.now() + '_' + Math.random();
    pendingSearchCallbacks[requestId] = (response) => {
      if (response.peerId) {
        let newContact = {
          peerId: response.peerId,
          username: response.username,
          encryptionKey: CryptoJS.lib.WordArray.random(32).toString(),
          peerInstance: null,
          online: false
        };
        contacts.push(newContact);
        connectToPeer(newContact);
        saveUserData();
        renderContactList();
        alert(`Контакт ${response.username} добавлен`);
      } else {
        alert('Пользователь не найден');
      }
    };
    for (let contact of contacts) {
      if (contact.online && contact.peerInstance) {
        contact.peerInstance.send(JSON.stringify({
          type: 'search_request',
          nick: nick,
          requestId: requestId
        }));
      }
    }
    // Таймаут
    setTimeout(() => {
      if (pendingSearchCallbacks[requestId]) {
        delete pendingSearchCallbacks[requestId];
        alert('Поиск не дал результатов');
      }
    }, 10000);
  }

  // Проверка уникальности логина при регистрации
  function checkLoginUnique(username, callback) {
    // Сначала локально
    if (loginRegistry[username] && loginRegistry[username] !== currentUser?.peerId) {
      callback(false);
      return;
    }
    let requestId = Date.now() + '_' + Math.random();
    pendingSearchCallbacks[requestId] = (response) => {
      callback(response.available);
    };
    let sent = false;
    for (let contact of contacts) {
      if (contact.online && contact.peerInstance) {
        contact.peerInstance.send(JSON.stringify({
          type: 'register_check',
          username: username,
          requestId: requestId
        }));
        sent = true;
      }
    }
    if (!sent) {
      // Нет онлайн-контактов, считаем уникальным
      callback(true);
    } else {
      setTimeout(() => {
        if (pendingSearchCallbacks[requestId]) {
          delete pendingSearchCallbacks[requestId];
          callback(true); // таймаут – считаем свободным
        }
      }, 5000);
    }
  }

  // ---------------------------- ОТПРАВКА СООБЩЕНИЙ ----------------------------
  function sendChatMessage(contact, text) {
    if (!contact.peerInstance || !contact.peerInstance.connected) {
      alert('Контакт не в сети');
      return;
    }
    const cipher = encryptMessage(text, contact.encryptionKey);
    contact.peerInstance.send(JSON.stringify({ type: 'chat', cipher: cipher }));
    if (!messages[contact.peerId]) messages[contact.peerId] = [];
    messages[contact.peerId].push({ text, own: true, time: new Date().toLocaleTimeString() });
    saveUserData();
    renderMessages();
  }

  // ---------------------------- ЗВОНКИ ----------------------------
  async function startCall(video) {
    if (!activeContactId) return;
    const contact = contacts.find(c => c.peerId === activeContactId);
    if (!contact || !contact.peerInstance) return;
    const stream = await navigator.mediaDevices.getUserMedia({ video: video, audio: true });
    localStream = stream;
    document.getElementById('localVideo').srcObject = stream;
    const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
    stream.getTracks().forEach(track => pc.addTrack(track, stream));
    pc.onicecandidate = event => {
      if (event.candidate) {
        contact.peerInstance.send(JSON.stringify({ type: 'call_candidate', candidate: event.candidate }));
      }
    };
    pc.ontrack = event => {
      document.getElementById('remoteVideo').srcObject = event.streams[0];
    };
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    contact.peerInstance.send(JSON.stringify({ type: 'call_offer', sdp: pc.localDescription }));
    currentCall = { pc, contact };
    document.getElementById('videoCallOverlay').classList.add('active');
  }

  function handleIncomingCall(peer, packet) {
    if (currentCall) {
      peer.send(JSON.stringify({ type: 'call_busy' }));
      return;
    }
    const accept = confirm('Входящий звонок. Принять?');
    if (!accept) return;
    navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
      localStream = stream;
      document.getElementById('localVideo').srcObject = stream;
      const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      stream.getTracks().forEach(track => pc.addTrack(track, stream));
      pc.onicecandidate = event => {
        if (event.candidate) {
          peer.send(JSON.stringify({ type: 'call_candidate', candidate: event.candidate }));
        }
      };
      pc.ontrack = event => {
        document.getElementById('remoteVideo').srcObject = event.streams[0];
      };
      pc.setRemoteDescription(new RTCSessionDescription(packet.sdp));
      pc.createAnswer().then(answer => {
        pc.setLocalDescription(answer);
        peer.send(JSON.stringify({ type: 'call_answer', sdp: pc.localDescription }));
      });
      currentCall = { pc, contact: contacts.find(c => c.peerInstance === peer) };
      document.getElementById('videoCallOverlay').classList.add('active');
    });
  }

  function endCall() {
    if (currentCall) {
      currentCall.pc.close();
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      localStream = null;
      currentCall = null;
    }
    document.getElementById('videoCallOverlay').classList.remove('active');
  }

  // ---------------------------- UI ----------------------------
  function renderContactList() {
    const container = document.getElementById('contactsList');
    container.innerHTML = '';
    for (let contact of contacts) {
      const div = document.createElement('div');
      div.className = 'contact-item';
      div.innerHTML = `
        <div>
          <span class="contact-name-list">${escapeHtml(contact.username)}</span>
          ${contact.online ? '<span class="online-badge"></span>' : '<span style="font-size:10px; color:gray;"> offline</span>'}
        </div>
      `;
      div.onclick = () => openChat(contact);
      container.appendChild(div);
    }
    if (contacts.length === 0) container.innerHTML = '<div style="text-align:center; padding:20px;">Нет контактов. Используйте поиск или QR-оффер.</div>';
    
    const chatsContainer = document.getElementById('chatsList');
    chatsContainer.innerHTML = '';
    for (let contact of contacts) {
      const lastMsg = messages[contact.peerId] ? messages[contact.peerId][messages[contact.peerId].length-1] : null;
      const div = document.createElement('div');
      div.className = 'contact-item';
      div.innerHTML = `
        <div>
          <span class="contact-name-list">${escapeHtml(contact.username)}</span>
          ${contact.online ? '<span class="online-badge"></span>' : ''}
          <div style="font-size:12px; color:#8e8e93;">${lastMsg ? lastMsg.text.substring(0,30) : 'Нет сообщений'}</div>
        </div>
      `;
      div.onclick = () => openChat(contact);
      chatsContainer.appendChild(div);
    }
    if (contacts.length === 0) chatsContainer.innerHTML = '<div style="text-align:center; padding:20px;">Нет чатов. Добавьте контакт.</div>';
  }

  function openChat(contact) {
    activeContactId = contact.peerId;
    document.getElementById('chatContactName').innerText = contact.username;
    renderMessages();
    document.getElementById('mainScreen').classList.remove('active');
    document.getElementById('chatScreen').classList.add('active');
  }

  function renderMessages() {
    const container = document.getElementById('messagesContainer');
    container.innerHTML = '';
    const msgs = messages[activeContactId] || [];
    msgs.forEach(msg => {
      const div = document.createElement('div');
      div.className = `message ${msg.own ? 'own' : ''}`;
      div.innerHTML = `<div class="message-text">${escapeHtml(msg.text)}</div><div class="message-time">${msg.time}</div>`;
      container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
  }

  function showQR(text, title) {
    const qrDiv = document.getElementById('qrPopup');
    qrDiv.innerHTML = `<div style="margin-bottom:8px; font-weight:bold;">${title}</div>`;
    new QRCode(qrDiv, { text: text, width: 200, height: 200 });
    qrDiv.classList.remove('hidden');
    setTimeout(() => qrDiv.classList.add('hidden'), 30000);
  }

  function showNotification(title, body) {
    if (Notification.permission === 'granted' && document.hidden && navigator.serviceWorker) {
      navigator.serviceWorker.ready.then(reg => reg.showNotification(title, { body, icon: 'icon.png' }));
    }
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

  // ---------------------------- РАСПРОСТРАНЕНИЕ ПРИЛОЖЕНИЯ (AirDrop) ----------------------------
  function shareAppViaAirDrop() {
    const htmlContent = document.documentElement.outerHTML;
    const blob = new Blob([htmlContent], {type: 'text/html'});
    const file = new File([blob], 'P2PChat.html', {type: 'text/html'});
    if (navigator.share && navigator.canShare && navigator.canShare({files: [file]})) {
      navigator.share({
        title: 'P2P Mesh Chat',
        text: 'Установите приложение',
        files: [file]
      }).catch(err => alert('Ошибка: ' + err));
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'P2PChat.html';
      a.click();
      URL.revokeObjectURL(url);
      alert('Файл сохранён. Передайте его через AirDrop вручную.');
    }
  }

  // ---------------------------- РЕГИСТРАЦИЯ / ЛОГИН ----------------------------
  function registerOrLogin(username, password) {
    const stored = localStorage.getItem('p2pmesh_auth');
    const hash = CryptoJS.SHA256(password).toString();
    if (stored) {
      const data = JSON.parse(stored);
      if (data.username === username && data.passwordHash === hash) {
        currentUser = { username: data.username, peerId: data.peerId, encryptionKey: data.encryptionKey };
        const saved = loadUserData();
        if (saved) {
          contacts = saved.contacts.map(c => ({ ...c, peerInstance: null, online: false }));
          messages = saved.messages;
          loginRegistry = saved.loginRegistry || {};
        }
        // Восстанавливаем соединения со всеми контактами
        for (let contact of contacts) {
          if (!contact.peerInstance) {
            connectToPeer(contact);
          }
        }
        renderContactList();
        showMainScreen();
        return;
      } else { alert('Неверный пароль'); return; }
    } else {
      // Регистрация нового пользователя – проверка уникальности
      checkLoginUnique(username, (isUnique) => {
        if (!isUnique) {
          alert('Этот логин уже занят в сети. Выберите другой.');
          return;
        }
        const salt = CryptoJS.lib.WordArray.random(16).toString();
        const encryptionKey = deriveKeyFromPassword(password, salt);
        const peerId = 'user_' + Date.now() + '_' + Math.random().toString(36);
        currentUser = { username, peerId, encryptionKey, salt };
        localStorage.setItem('p2pmesh_auth', JSON.stringify({ username, passwordHash: hash, salt, peerId, encryptionKey }));
        // Добавляем себя в реестр
        loginRegistry[username] = peerId;
        saveUserData();
        // Устанавливаем соединения с существующими контактами (пока пусто)
        showMainScreen();
      });
    }
  }

  function showMainScreen() {
    document.getElementById('authScreen').classList.remove('active');
    document.getElementById('mainScreen').classList.add('active');
    document.getElementById('networkInfo').innerText = `Ваш ID: ${currentUser.peerId.slice(0,12)}...`;
    renderContactList();
    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const tabName = tab.dataset.tab;
        document.getElementById('chatsList').classList.add('hidden');
        document.getElementById('contactsList').classList.add('hidden');
        if (tabName === 'chats') {
          document.getElementById('chatsList').classList.remove('hidden');
          document.getElementById('addContactPanel').classList.add('hidden');
        } else {
          document.getElementById('contactsList').classList.remove('hidden');
          document.getElementById('addContactPanel').classList.remove('hidden');
        }
      };
    });
    document.querySelector('.tab[data-tab="chats"]').click();
  }

  // ---------------------------- ОБРАБОТЧИКИ UI ----------------------------
  document.getElementById('loginBtn').onclick = () => {
    const user = document.getElementById('loginUsername').value.trim();
    const pass = document.getElementById('loginPassword').value;
    if (user && pass) registerOrLogin(user, pass);
    else alert('Введите логин и пароль');
  };
  document.getElementById('generateOfferBtn').onclick = () => generateOfferForNewContact();
  document.getElementById('addManualBtn').onclick = () => addContactManually();
  document.getElementById('searchContactBtn').onclick = () => {
    const nick = document.getElementById('searchNickInput').value.trim();
    if (nick) searchContactByNick(nick);
  };
  document.getElementById('sendMsgBtn').onclick = () => {
    const text = document.getElementById('messageInput').value;
    if (!text || !activeContactId) return;
    const contact = contacts.find(c => c.peerId === activeContactId);
    if (contact) sendChatMessage(contact, text);
    document.getElementById('messageInput').value = '';
  };
  document.getElementById('chatBackBtn').onclick = () => {
    document.getElementById('chatScreen').classList.remove('active');
    document.getElementById('mainScreen').classList.add('active');
    activeContactId = null;
  };
  document.getElementById('audioCallBtn').onclick = () => startCall(false);
  document.getElementById('videoCallBtn').onclick = () => startCall(true);
  document.getElementById('hangupBtn').onclick = () => endCall();
  document.getElementById('shareAppBtn').onclick = () => shareAppViaAirDrop();
  document.getElementById('shareFileBtn').onclick = () => shareAppViaAirDrop();

  // Автозаполнение логина
  (function() {
    const auth = localStorage.getItem('p2pmesh_auth');
    if (auth) {
      try {
        const data = JSON.parse(auth);
        document.getElementById('loginUsername').value = data.username;
      } catch(e) {}
    }
  })();
