<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Накопления — семейный бюджет</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #F8FAFC;
            color: #0F172A;
            padding: 20px 16px 40px;
            transition: background 0.2s, color 0.2s;
        }
        body.dark { background: #0F172A; color: #E2E8F0; }
        .card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(226, 232, 240, 0.6);
        }
        body.dark .card { background: rgba(30, 41, 59, 0.9); border-color: #334155; }
        .grid-buttons { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        button, .btn {
            background: #0F172A;
            border: none;
            padding: 10px 20px;
            border-radius: 44px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }
        button:active { transform: scale(0.96); }
        .btn-accent { background: #F59E0B; color: #0F172A; }
        .btn-outline { background: white; border: 1px solid #CBD5E1; color: #0F172A; }
        body.dark .btn-outline { background: #1E293B; border-color: #475569; color: #E2E8F0; }
        .modal {
            display: none;
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-card { max-width: 500px; margin: 20px; background: white; max-height: 90vh; overflow-y: auto; border-radius: 28px; padding: 20px; }
        body.dark .modal-card { background: #1E293B; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 4px; color: #475569; }
        body.dark label { color: #94A3B8; }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 24px;
            border: 1px solid #CBD5E1;
            background: white;
            font-size: 0.9rem;
        }
        body.dark input, body.dark select, body.dark textarea { background: #1E293B; border-color: #475569; color: #E2E8F0; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; display: block; overflow-x: auto; }
        th, td { text-align: left; padding: 10px 6px; border-bottom: 1px solid #E2E8F0; }
        body.dark th, body.dark td { border-bottom-color: #334155; }
        .money-positive { color: #10B981; font-weight: 600; }
        .money-negative { color: #EF4444; }
        .forecast { color: #F59E0B; font-weight: 500; }
        .progress-bar { background: #E2E8F0; border-radius: 20px; height: 12px; overflow: hidden; margin: 12px 0; }
        .progress-fill { background: #F59E0B; width: 0%; height: 100%; transition: width 0.3s; }
        .category-badge { display: inline-flex; align-items: center; gap: 4px; background: #E2E8F0; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        @media (max-width: 640px) { body { padding: 16px 12px; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<div id="appContent">
<div style="max-width:1400px; margin:0 auto;">
    <div class="card" style="background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%); color: white; border: none;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1 style="color:white;">💰 Накопления Pro</h1>
            <div><button id="themeToggleBtn" style="background:rgba(255,255,255,0.2);">🌓 Тема</button></div>
        </div>
        <div class="grid-buttons" style="margin-top:12px;">
            <button id="openAddBtn" class="btn-accent">+ Добавить доход</button>
            <button id="openExpenseBtn">- Расход</button>
            <button id="undoBtn">↩️ Отменить</button>
            <button id="redoBtn">↪️ Повторить</button>
            <button id="exportJsonBtn">💾 Экспорт JSON</button>
            <button id="importJsonBtn">📂 Импорт JSON</button>
            <input type="file" id="importFileInput" accept=".json" style="display: none;">
        </div>
    </div>

    <!-- Дашборд -->
    <div class="card" id="dashboard">
        <h3>📊 Текущий баланс</h3>
        <div id="balanceDisplay" style="font-size: 2rem; font-weight: bold;">0 ₽</div>
        <div class="flex-row" style="margin-top: 12px;">
            <div>🎯 Цель: <span id="goalShort">не задана</span></div>
            <div>📅 Прогресс: <span id="goalProgressShort">0%</span></div>
        </div>
    </div>

    <!-- Вкладки -->
    <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;">
        <button id="tabYears" class="btn btn-accent">📆 Прогноз 40 лет</button>
        <button id="tabMonths" class="btn btn-outline">📅 Месяцы</button>
        <button id="tabLog" class="btn btn-outline">📜 Лог операций</button>
        <button id="tabAnalytics" class="btn btn-outline">📊 Аналитика</button>
        <button id="tabGoal" class="btn btn-outline">🎯 Цель</button>
        <button id="tabBudget" class="btn btn-outline">💰 Бюджеты</button>
        <button id="tabMembers" class="btn btn-outline">👥 Участники</button>
        <button id="tabSettings" class="btn btn-outline">⚙️ Настройки</button>
    </div>

    <!-- Панели -->
    <div id="yearsPanel" class="card"></div>
    <div id="monthsPanel" class="card" style="display: none;"></div>
    <div id="logPanel" class="card" style="display: none;">
        <div class="flex-row" style="margin-bottom: 16px;">
            <input type="text" id="logSearch" placeholder="🔍 Поиск">
            <select id="logTypeFilter"><option value="">Все типы</option><option value="income">Доходы</option><option value="expense">Расходы</option></select>
            <select id="logCategoryFilter"><option value="">Все категории</option></select>
            <select id="logMemberFilter"><option value="">Все участники</option></select>
        </div>
        <div id="logTableContainer"></div>
    </div>
    <div id="analyticsPanel" class="card" style="display: none;">
        <div id="comparePeriods"></div>
        <canvas id="weekdayChart" width="400" height="200" style="max-width:100%;"></canvas>
        <div class="flex-row"><canvas id="incomeChart" width="200" height="200"></canvas><canvas id="expenseChart" width="200" height="200"></canvas></div>
    </div>
    <div id="goalPanel" class="card" style="display: none;">
        <div class="form-group"><label>Название цели</label><input type="text" id="goalName" placeholder="Например: Новая машина"></div>
        <div class="form-group"><label>Целевая сумма (₽)</label><input type="number" id="goalTarget" step="1000"></div>
        <div class="form-group"><label>Дата достижения</label><input type="date" id="goalDate"></div>
        <div class="form-group"><label>Начальный взнос (₽)</label><input type="number" id="goalInitial" step="1000" value="0"></div>
        <button id="saveGoalBtn" class="btn-accent">Сохранить цель</button>
        <div id="goalProgressDetail" style="margin-top: 20px;"></div>
    </div>
    <div id="budgetPanel" class="card" style="display: none;">
        <h3>Бюджеты по категориям (в месяц)</h3>
        <div id="budgetsList"></div>
        <div class="flex-row" style="margin-top: 16px;">
            <select id="budgetCategorySelect" style="flex:2;"></select>
            <input type="number" id="budgetLimit" placeholder="Лимит ₽" style="flex:1;">
            <button id="setBudgetBtn" class="btn-outline">Установить</button>
        </div>
    </div>
    <div id="membersPanel" class="card" style="display: none;">
        <h3>Участники семьи</h3>
        <div id="membersList"></div>
        <div class="flex-row" style="margin-top: 16px;">
            <input type="text" id="newMemberName" placeholder="Имя участника" style="flex:2;">
            <button id="addMemberBtn" class="btn-outline">Добавить</button>
        </div>
    </div>
    <div id="settingsPanel" class="card" style="display: none;">
        <h3>Процентная ставка</h3>
        <div class="flex-row"><input type="number" id="globalPercent" step="0.5" value="5" style="width:100px;"> %</div>
        <div><label><input type="radio" name="interestType" value="simple" checked> Простой процент</label> <label><input type="radio" name="interestType" value="compound"> Капитализация</label></div>
        <hr style="margin: 16px 0;">
        <h3>Тёмная тема</h3>
        <button id="darkModeToggle" class="btn-outline">Переключить тему</button>
        <hr>
        <h3>PIN-код (4 цифры)</h3>
        <input type="password" id="pinCode" maxlength="4" placeholder="Новый PIN">
        <button id="savePinBtn" class="btn-outline">Сохранить PIN</button>
        <p style="font-size:0.7rem; margin-top:8px;">При установке PIN данные будут зашифрованы. При следующем запуске потребуется ввод.</p>
    </div>
</div>
</div>

<script>
    // ======================== ГЛОБАЛЬНОЕ СОСТОЯНИЕ ========================
    let appData = {
        transactions: [],
        budgets: {},           // { "Категория": лимит }
        members: ["Я", "Супруг(а)", "Дети"],
        goal: { name: "", target: 0, date: "", initial: 0 },
        settings: {
            darkMode: false,
            defaultInterest: 5,
            interestType: "simple",
            pinHash: ""
        }
    };

    let undoStack = [];
    let redoStack = [];
    let charts = {};

    // DOM элементы
    const balanceDisplay = document.getElementById('balanceDisplay');
    const goalShort = document.getElementById('goalShort');
    const goalProgressShort = document.getElementById('goalProgressShort');
    const yearsPanel = document.getElementById('yearsPanel');
    const monthsPanel = document.getElementById('monthsPanel');
    const logTableContainer = document.getElementById('logTableContainer');
    const analyticsPanel = document.getElementById('analyticsPanel');
    const goalPanel = document.getElementById('goalPanel');
    const budgetPanel = document.getElementById('budgetPanel');
    const membersPanel = document.getElementById('membersPanel');
    const settingsPanel = document.getElementById('settingsPanel');
    const logSearch = document.getElementById('logSearch');
    const logTypeFilter = document.getElementById('logTypeFilter');
    const logCategoryFilter = document.getElementById('logCategoryFilter');
    const logMemberFilter = document.getElementById('logMemberFilter');
    const themeToggle = document.getElementById('themeToggleBtn');
    const darkModeToggle = document.getElementById('darkModeToggle');
    const openAddBtn = document.getElementById('openAddBtn');
    const openExpenseBtn = document.getElementById('openExpenseBtn');
    const undoBtn = document.getElementById('undoBtn');
    const redoBtn = document.getElementById('redoBtn');
    const exportJsonBtn = document.getElementById('exportJsonBtn');
    const importJsonBtn = document.getElementById('importJsonBtn');
    const importFileInput = document.getElementById('importFileInput');
    const globalPercent = document.getElementById('globalPercent');
    const saveGoalBtn = document.getElementById('saveGoalBtn');
    const goalName = document.getElementById('goalName');
    const goalTarget = document.getElementById('goalTarget');
    const goalDate = document.getElementById('goalDate');
    const goalInitial = document.getElementById('goalInitial');
    const budgetCategorySelect = document.getElementById('budgetCategorySelect');
    const budgetLimit = document.getElementById('budgetLimit');
    const setBudgetBtn = document.getElementById('setBudgetBtn');
    const newMemberName = document.getElementById('newMemberName');
    const addMemberBtn = document.getElementById('addMemberBtn');
    const pinCodeInput = document.getElementById('pinCode');
    const savePinBtn = document.getElementById('savePinBtn');
    const tabYears = document.getElementById('tabYears');
    const tabMonths = document.getElementById('tabMonths');
    const tabLog = document.getElementById('tabLog');
    const tabAnalytics = document.getElementById('tabAnalytics');
    const tabGoal = document.getElementById('tabGoal');
    const tabBudget = document.getElementById('tabBudget');
    const tabMembers = document.getElementById('tabMembers');
    const tabSettings = document.getElementById('tabSettings');

    let activeTab = 'years';
    let currentEditId = null;

    // ======================== СОХРАНЕНИЕ И ЗАГРУЗКА ========================
    function saveToLocalStorage() {
        localStorage.setItem('savings_app_data', JSON.stringify(appData));
        // Также сохраняем резервную копию в localStorage на случай сбоя
        localStorage.setItem('savings_backup', JSON.stringify(appData));
    }

    function loadFromLocalStorage() {
        const saved = localStorage.getItem('savings_app_data');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                appData = data;
            } catch(e) { console.warn("Ошибка загрузки"); }
        }
        // Проверяем целостность данных
        if (!appData.transactions) appData.transactions = [];
        if (!appData.budgets) appData.budgets = {};
        if (!appData.members) appData.members = ["Я", "Супруг(а)", "Дети"];
        if (!appData.goal) appData.goal = { name: "", target: 0, date: "", initial: 0 };
        if (!appData.settings) appData.settings = { darkMode: false, defaultInterest: 5, interestType: "simple", pinHash: "" };
        if (appData.settings.darkMode) document.body.classList.add('dark');
        globalPercent.value = appData.settings.defaultInterest;
        if (appData.settings.interestType === 'compound') document.querySelector('input[value="compound"]').checked = true;
        else document.querySelector('input[value="simple"]').checked = true;
    }

    function pushState() {
        undoStack.push(JSON.parse(JSON.stringify(appData)));
        redoStack = [];
        if (undoStack.length > 50) undoStack.shift();
        saveToLocalStorage();
    }

    function undo() {
        if (undoStack.length === 0) return;
        const prev = undoStack.pop();
        redoStack.push(JSON.parse(JSON.stringify(appData)));
        appData = prev;
        saveToLocalStorage();
        renderAll();
    }

    function redo() {
        if (redoStack.length === 0) return;
        const next = redoStack.pop();
        undoStack.push(JSON.parse(JSON.stringify(appData)));
        appData = next;
        saveToLocalStorage();
        renderAll();
    }

    // ======================== ФИНАНСОВЫЕ РАСЧЁТЫ ========================
    function getCurrentBalance() {
        let bal = 0;
        appData.transactions.forEach(t => bal += t.amount);
        return bal;
    }

    function getBalanceUpToDate(dateStr) {
        let bal = 0;
        appData.transactions.forEach(t => { if (t.date <= dateStr) bal += t.amount; });
        return bal;
    }

    function getMonthlyNet(year, month) {
        let net = 0;
        const start = `${year}-${String(month).padStart(2,'0')}-01`;
        const end = `${year}-${String(month).padStart(2,'0')}-${new Date(year, month, 0).getDate()}`;
        appData.transactions.forEach(t => { if (t.date >= start && t.date <= end) net += t.amount; });
        return net;
    }

    function getYearlyForecast() {
        if (appData.transactions.length === 0) return [];
        const yearsSet = new Set();
        appData.transactions.forEach(t => yearsSet.add(parseInt(t.date.slice(0,4))));
        const minYear = Math.min(...yearsSet);
        const currentYear = new Date().getFullYear();
        const maxYear = currentYear + 40;
        const years = [];
        for (let y = minYear; y <= maxYear; y++) years.push(y);
        const result = [];
        for (let i = 0; i < years.length; i++) {
            const year = years[i];
            const isPast = year <= currentYear;
            let startBalance = i === 0 ? getBalanceUpToDate(`${year}-01-01`) : (result[i-1].isPast ? result[i-1].actualEnd : result[i-1].forecastEnd);
            let added = 0, withdrawn = 0;
            if (isPast) {
                appData.transactions.forEach(t => {
                    if (parseInt(t.date.slice(0,4)) === year) {
                        if (t.amount > 0) added += t.amount;
                        else withdrawn += Math.abs(t.amount);
                    }
                });
            }
            const net = added - withdrawn;
            const interest = appData.settings.defaultInterest;
            let forecast;
            if (appData.settings.interestType === "simple") {
                forecast = startBalance * (1 + interest/100) + net;
            } else {
                let bal = startBalance;
                for (let m = 1; m <= 12; m++) {
                    bal = bal * (1 + interest/100/12) + getMonthlyNet(year, m);
                }
                forecast = bal;
            }
            const actualEnd = isPast ? getBalanceUpToDate(`${year}-12-31`) : null;
            result.push({ year, startBalance, added, withdrawn, forecastEnd: forecast, actualEnd, isPast });
        }
        return result;
    }

    // ======================== ОПЕРАЦИИ С ТРАНЗАКЦИЯМИ ========================
    function addTransaction(amount, type, date, category, member, desc) {
        if (!date) date = new Date().toISOString().slice(0,10);
        const finalAmount = type === 'income' ? Math.abs(amount) : -Math.abs(amount);
        const newTxn = {
            id: Date.now() + Math.random(),
            date: date,
            amount: finalAmount,
            category: category,
            member: member || "Я",
            description: desc || ""
        };
        pushState();
        appData.transactions.push(newTxn);
        appData.transactions.sort((a,b)=>a.date.localeCompare(b.date));
        saveToLocalStorage();
        renderAll();
    }

    function deleteTransaction(id) {
        pushState();
        appData.transactions = appData.transactions.filter(t => t.id !== id);
        saveToLocalStorage();
        renderAll();
    }

    function updateTransaction(id, newData) {
        pushState();
        const idx = appData.transactions.findIndex(t => t.id === id);
        if (idx !== -1) {
            appData.transactions[idx] = { ...appData.transactions[idx], ...newData };
            appData.transactions.sort((a,b)=>a.date.localeCompare(b.date));
            saveToLocalStorage();
            renderAll();
        }
    }

    // ======================== РЕНДЕР ========================
    function renderDashboard() {
        const balance = getCurrentBalance();
        balanceDisplay.innerText = balance.toLocaleString() + ' ₽';
        if (appData.goal.target) {
            const saved = balance + (appData.goal.initial || 0);
            const percent = Math.min(100, (saved / appData.goal.target) * 100);
            goalShort.innerText = appData.goal.name || 'Цель';
            goalProgressShort.innerText = percent.toFixed(0) + '%';
        } else {
            goalShort.innerText = 'не задана';
            goalProgressShort.innerText = '0%';
        }
    }

    function renderYears() {
        const data = getYearlyForecast();
        if (!data.length) { yearsPanel.innerHTML = '<p>Нет данных. Добавьте первую операцию.</p>'; return; }
        let html = `<h3>📈 Прогноз на 40 лет (${appData.settings.interestType === 'simple' ? 'простой %' : 'капитализация'})</h3><div class="scroll-table"><table><thead><tr><th>Год</th><th>Нач. баланс</th><th>Пополн.</th><th>Снято</th><th>Прогноз</th><th>Факт</th></tr></thead><tbody>`;
        data.forEach(row => {
            html += `<tr>
                <td>${row.year}</td>
                <td>${row.startBalance.toLocaleString()} ₽</td>
                <td class="money-positive">${row.added.toLocaleString()} ₽</td>
                <td class="money-negative">${row.withdrawn.toLocaleString()} ₽</td>
                <td class="forecast">${row.forecastEnd.toLocaleString()} ₽</td>
                <td>${row.actualEnd !== null ? row.actualEnd.toLocaleString() + ' ₽' : '—'}</td>
            </tr>`;
        });
        html += `</tbody></table></div>`;
        yearsPanel.innerHTML = html;
    }

    function renderMonths() {
        const monthly = new Map();
        let running = 0;
        [...appData.transactions].sort((a,b)=>a.date.localeCompare(b.date)).forEach(t => {
            running += t.amount;
            const ym = t.date.slice(0,7);
            if (!monthly.has(ym)) monthly.set(ym, { added:0, withdrawn:0, balance:0 });
            const rec = monthly.get(ym);
            if (t.amount > 0) rec.added += t.amount;
            else rec.withdrawn += Math.abs(t.amount);
            rec.balance = running;
        });
        if (monthly.size === 0) { monthsPanel.innerHTML = '<p>Нет операций</p>'; return; }
        let html = `<h3>📅 Помесячная динамика</h3><div class="scroll-table"><table><thead><tr><th>Месяц</th><th>Пополнения</th><th>Снятия</th><th>Чистое</th><th>Баланс</th></tr></thead><tbody>`;
        for (let [ym, rec] of monthly.entries()) {
            const net = rec.added - rec.withdrawn;
            html += `<tr>
                <td>${ym}</td>
                <td class="money-positive">${rec.added.toLocaleString()} ₽</td>
                <td class="money-negative">${rec.withdrawn.toLocaleString()} ₽</td>
                <td>${net >=0 ? '+' : ''}${net.toLocaleString()} ₽</td>
                <td><strong>${rec.balance.toLocaleString()} ₽</strong></td>
            </tr>`;
        }
        html += `</tbody></table></div>`;
        monthsPanel.innerHTML = html;
    }

    function renderLog() {
        let filtered = [...appData.transactions];
        const search = logSearch.value.toLowerCase();
        const type = logTypeFilter.value;
        const category = logCategoryFilter.value;
        const member = logMemberFilter.value;
        if (search) filtered = filtered.filter(t => (t.description||'').toLowerCase().includes(search) || t.category.toLowerCase().includes(search));
        if (type === 'income') filtered = filtered.filter(t => t.amount > 0);
        if (type === 'expense') filtered = filtered.filter(t => t.amount < 0);
        if (category) filtered = filtered.filter(t => t.category === category);
        if (member) filtered = filtered.filter(t => t.member === member);
        filtered.sort((a,b)=>b.date.localeCompare(a.date));
        if (filtered.length === 0) { logTableContainer.innerHTML = '<p>Нет записей</p>'; return; }
        let html = `<div class="scroll-table"><table><thead><tr><th>Дата</th><th>Сумма</th><th>Категория</th><th>Участник</th><th>Комментарий</th><th></th></tr></thead><tbody>`;
        filtered.forEach(t => {
            const sign = t.amount > 0 ? `+${t.amount.toLocaleString()} ₽` : `${t.amount.toLocaleString()} ₽`;
            html += `<tr>
                <td>${t.date}</td>
                <td class="${t.amount>0?'money-positive':'money-negative'}">${sign}</td>
                <td><span class="category-badge">${t.category}</span></td>
                <td>${t.member}</td>
                <td>${t.description || ''}</td>
                <td><button class="edit-btn" data-id="${t.id}">✏️</button> <button class="delete-btn" data-id="${t.id}">🗑️</button></td>
            </tr>`;
        });
        html += `</tbody></table></div>`;
        logTableContainer.innerHTML = html;
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.onclick = () => deleteTransaction(parseInt(btn.dataset.id));
        });
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.onclick = () => openEditModal(parseInt(btn.dataset.id));
        });
    }

    function renderAnalytics() {
        // Сравнение периодов
        const now = new Date();
        const thisYear = now.getFullYear();
        const thisMonth = now.getMonth() + 1;
        let thisMonthFlow = 0, lastMonthFlow = 0, lastYearMonthFlow = 0;
        appData.transactions.forEach(t => {
            const [y,m] = t.date.split('-');
            if (y == thisYear && m == thisMonth) thisMonthFlow += t.amount;
            if ((y == thisYear && m == thisMonth-1) || (m == 12 && y == thisYear-1)) lastMonthFlow += t.amount;
            if (y == thisYear-1 && m == thisMonth) lastYearMonthFlow += t.amount;
        });
        document.getElementById('comparePeriods').innerHTML = `
            <h3>📈 Сравнение</h3>
            <p>💰 Этот месяц: ${thisMonthFlow.toLocaleString()} ₽</p>
            <p>📉 Прошлый месяц: ${lastMonthFlow.toLocaleString()} ₽ (${((thisMonthFlow-lastMonthFlow)/lastMonthFlow*100||0).toFixed(1)}%)</p>
            <p>📆 Аналогичный месяц прошлого года: ${lastYearMonthFlow.toLocaleString()} ₽ (${((thisMonthFlow-lastYearMonthFlow)/lastYearMonthFlow*100||0).toFixed(1)}%)</p>
        `;
        // Дни недели
        const weekday = [0,0,0,0,0,0,0];
        appData.transactions.forEach(t => {
            const w = new Date(t.date).getDay();
            weekday[w] += t.amount;
        });
        if (charts.weekday) charts.weekday.destroy();
        const ctxWeek = document.getElementById('weekdayChart').getContext('2d');
        charts.weekday = new Chart(ctxWeek, { type: 'bar', data: { labels: ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'], datasets: [{ label: 'Чистый поток', data: weekday, backgroundColor: '#F59E0B' }] } });
        // Круговые диаграммы доходов/расходов
        const incomeByCat = {}, expenseByCat = {};
        appData.transactions.forEach(t => {
            if (t.amount > 0) incomeByCat[t.category] = (incomeByCat[t.category] || 0) + t.amount;
            else expenseByCat[t.category] = (expenseByCat[t.category] || 0) + Math.abs(t.amount);
        });
        if (charts.income) charts.income.destroy();
        if (charts.expense) charts.expense.destroy();
        const ctxInc = document.getElementById('incomeChart').getContext('2d');
        const ctxExp = document.getElementById('expenseChart').getContext('2d');
        if (Object.keys(incomeByCat).length) charts.income = new Chart(ctxInc, { type: 'pie', data: { labels: Object.keys(incomeByCat), datasets: [{ data: Object.values(incomeByCat), backgroundColor: ['#10B981','#3B82F6','#F59E0B','#EF4444','#8B5CF6'] }] } });
        if (Object.keys(expenseByCat).length) charts.expense = new Chart(ctxExp, { type: 'pie', data: { labels: Object.keys(expenseByCat), datasets: [{ data: Object.values(expenseByCat), backgroundColor: ['#F59E0B','#EF4444','#8B5CF6','#EC4899'] }] } });
    }

    function renderGoal() {
        if (appData.goal.target) {
            const balance = getCurrentBalance();
            const saved = balance + (appData.goal.initial || 0);
            const percent = Math.min(100, (saved / appData.goal.target) * 100);
            let monthlyNeed = 0;
            if (appData.goal.date) {
                const today = new Date();
                const targetDate = new Date(appData.goal.date);
                const monthsLeft = Math.max(1, (targetDate.getFullYear() - today.getFullYear()) * 12 + (targetDate.getMonth() - today.getMonth()));
                const needed = Math.max(0, appData.goal.target - saved);
                monthlyNeed = needed / monthsLeft;
            }
            document.getElementById('goalProgressDetail').innerHTML = `
                <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%;"></div></div>
                <p>Накоплено: ${saved.toLocaleString()} / ${appData.goal.target.toLocaleString()} ₽ (${percent.toFixed(1)}%)</p>
                <p>Осталось: ${(appData.goal.target - saved).toLocaleString()} ₽</p>
                ${monthlyNeed ? `<p>Нужно откладывать ~${monthlyNeed.toLocaleString()} ₽ в месяц</p>` : ''}
                <p>Дата цели: ${appData.goal.date || 'не задана'}</p>
            `;
        } else {
            document.getElementById('goalProgressDetail').innerHTML = '<p>Цель не задана. Заполните форму выше.</p>';
        }
    }

    function renderBudgets() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const start = `${year}-${String(month).padStart(2,'0')}-01`;
        const end = `${year}-${String(month).padStart(2,'0')}-${new Date(year, month, 0).getDate()}`;
        const spent = {};
        appData.transactions.forEach(t => {
            if (t.date >= start && t.date <= end && t.amount < 0) {
                spent[t.category] = (spent[t.category] || 0) + Math.abs(t.amount);
            }
        });
        let html = '';
        for (let cat in appData.budgets) {
            const limit = appData.budgets[cat];
            const used = spent[cat] || 0;
            const percent = (used / limit) * 100;
            let color = '#10B981';
            if (percent >= 100) color = '#EF4444';
            else if (percent >= 80) color = '#F59E0B';
            html += `<div><strong>${cat}</strong>: ${used.toLocaleString()} / ${limit.toLocaleString()} ₽</div>
                     <div class="progress-bar"><div style="width: ${Math.min(100,percent)}%; height:8px; background:${color}; border-radius:20px;"></div></div>`;
        }
        budgetsListDiv.innerHTML = html || '<p>Нет установленных бюджетов</p>';
        // Обновить селект категорий
        const allCats = new Set(appData.transactions.map(t => t.category));
        budgetCategorySelect.innerHTML = Array.from(allCats).map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function renderMembers() {
        membersListDiv.innerHTML = appData.members.map(m => `<span class="category-badge" style="margin:4px;">${m} <button class="remove-member" data-member="${m}" style="background:none; border:none; color:red;">✖</button></span>`).join('');
        document.querySelectorAll('.remove-member').forEach(btn => {
            btn.onclick = () => {
                const member = btn.dataset.member;
                pushState();
                appData.members = appData.members.filter(m => m !== member);
                saveToLocalStorage();
                renderMembers();
                renderLog();
            };
        });
        // Обновить фильтр участников в логе
        logMemberFilter.innerHTML = '<option value="">Все участники</option>' + appData.members.map(m => `<option value="${m}">${m}</option>`).join('');
    }

    function renderSettings() {
        globalPercent.value = appData.settings.defaultInterest;
        if (appData.settings.interestType === 'compound') document.querySelector('input[value="compound"]').checked = true;
        else document.querySelector('input[value="simple"]').checked = true;
    }

    function renderAll() {
        renderDashboard();
        renderYears();
        renderMonths();
        renderLog();
        renderAnalytics();
        renderGoal();
        renderBudgets();
        renderMembers();
        renderSettings();
        // Показать активную вкладку
        const panels = { years: yearsPanel, months: monthsPanel, log: document.getElementById('logPanel'), analytics: analyticsPanel, goal: goalPanel, budget: budgetPanel, members: membersPanel, settings: settingsPanel };
        for (let p in panels) panels[p].style.display = 'none';
        panels[activeTab].style.display = 'block';
        // Подсветка кнопок вкладок
        const btns = { years: tabYears, months: tabMonths, log: tabLog, analytics: tabAnalytics, goal: tabGoal, budget: tabBudget, members: tabMembers, settings: tabSettings };
        for (let p in btns) btns[p].classList.remove('btn-accent');
        btns[activeTab].classList.add('btn-accent');
    }

    // ======================== МОДАЛЬНЫЕ ОКНА ========================
    function openAddModal(type) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        const isIncome = type === 'income';
        modal.innerHTML = `
            <div class="modal-card">
                <h3>${isIncome ? '➕ Добавить доход' : '➖ Расход'}</h3>
                <div class="form-group"><label>Сумма (₽)</label><input type="number" id="modalAmount" step="1" value="1000"></div>
                <div class="form-group"><label>Дата</label><input type="date" id="modalDate" value="${new Date().toISOString().slice(0,10)}"></div>
                <div class="form-group"><label>Категория</label><select id="modalCategory">${getCategoryOptions()}</select></div>
                <div class="form-group"><label>Участник</label><select id="modalMember">${appData.members.map(m => `<option value="${m}">${m}</option>`).join('')}</select></div>
                <div class="form-group"><label>Комментарий</label><input type="text" id="modalDesc"></div>
                <div class="flex-row" style="justify-content: flex-end;">
                    <button id="modalCancel" class="btn-outline">Отмена</button>
                    <button id="modalSave" class="btn-accent">Сохранить</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('modalCancel').onclick = () => modal.remove();
        document.getElementById('modalSave').onclick = () => {
            const amount = parseFloat(document.getElementById('modalAmount').value);
            if (isNaN(amount) || amount <= 0) { alert('Введите сумму > 0'); return; }
            const date = document.getElementById('modalDate').value;
            const category = document.getElementById('modalCategory').value;
            const member = document.getElementById('modalMember').value;
            const desc = document.getElementById('modalDesc').value;
            addTransaction(amount, type, date, category, member, desc);
            modal.remove();
        };
    }

    function openEditModal(id) {
        const txn = appData.transactions.find(t => t.id === id);
        if (!txn) return;
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `
            <div class="modal-card">
                <h3>✏️ Редактировать</h3>
                <div class="form-group"><label>Сумма (₽)</label><input type="number" id="modalAmount" step="1" value="${Math.abs(txn.amount)}"></div>
                <div class="form-group"><label>Дата</label><input type="date" id="modalDate" value="${txn.date}"></div>
                <div class="form-group"><label>Категория</label><select id="modalCategory">${getCategoryOptions(txn.category)}</select></div>
                <div class="form-group"><label>Участник</label><select id="modalMember">${appData.members.map(m => `<option value="${m}" ${m === txn.member ? 'selected' : ''}>${m}</option>`).join('')}</select></div>
                <div class="form-group"><label>Комментарий</label><input type="text" id="modalDesc" value="${txn.description || ''}"></div>
                <div class="flex-row" style="justify-content: flex-end;">
                    <button id="modalCancel" class="btn-outline">Отмена</button>
                    <button id="modalSave" class="btn-accent">Сохранить</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('modalCancel').onclick = () => modal.remove();
        document.getElementById('modalSave').onclick = () => {
            const amount = parseFloat(document.getElementById('modalAmount').value);
            if (isNaN(amount) || amount <= 0) { alert('Введите сумму > 0'); return; }
            const finalAmount = txn.amount > 0 ? amount : -amount;
            updateTransaction(id, {
                amount: finalAmount,
                date: document.getElementById('modalDate').value,
                category: document.getElementById('modalCategory').value,
                member: document.getElementById('modalMember').value,
                description: document.getElementById('modalDesc').value
            });
            modal.remove();
        };
    }

    function getCategoryOptions(selected = '') {
        const defaultCats = ['💰 Зарплата', '🎁 Подарок', '🍔 Еда', '🚗 Транспорт', '🏠 Жильё', '💊 Здоровье', '🎉 Развлечения', '📚 Образование', '💼 Инвестиции', '📦 Другое'];
        return defaultCats.map(c => `<option value="${c}" ${c === selected ? 'selected' : ''}>${c}</option>`).join('');
    }

    // ======================== ЭКСПОРТ / ИМПОРТ JSON ========================
    function exportToJson() {
        const dataStr = JSON.stringify(appData, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `savings_backup_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importFromJson(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                pushState();
                appData = imported;
                // Гарантируем структуру
                if (!appData.transactions) appData.transactions = [];
                if (!appData.budgets) appData.budgets = {};
                if (!appData.members) appData.members = ["Я", "Супруг(а)", "Дети"];
                if (!appData.goal) appData.goal = { name: "", target: 0, date: "", initial: 0 };
                if (!appData.settings) appData.settings = { darkMode: false, defaultInterest: 5, interestType: "simple", pinHash: "" };
                saveToLocalStorage();
                renderAll();
                alert('Импорт успешно выполнен');
            } catch(err) {
                alert('Ошибка при импорте: неверный формат файла');
            }
        };
        reader.readAsText(file);
    }

    // ======================== НАСТРОЙКИ ========================
    function toggleTheme() {
        appData.settings.darkMode = !appData.settings.darkMode;
        if (appData.settings.darkMode) document.body.classList.add('dark');
        else document.body.classList.remove('dark');
        saveToLocalStorage();
    }

    function savePin() {
        const pin = pinCodeInput.value;
        if (pin.length === 4 && /^\d+$/.test(pin)) {
            appData.settings.pinHash = btoa(pin); // простое кодирование, не шифрование
            saveToLocalStorage();
            alert('PIN сохранён. При перезагрузке приложение запросит PIN.');
        } else {
            alert('PIN должен быть 4 цифры');
        }
    }

    // ======================== ИНИЦИАЛИЗАЦИЯ ========================
    function init() {
        loadFromLocalStorage();
        renderAll();

        // Обработчики кнопок
        openAddBtn.onclick = () => openAddModal('income');
        openExpenseBtn.onclick = () => openAddModal('expense');
        undoBtn.onclick = undo;
        redoBtn.onclick = redo;
        exportJsonBtn.onclick = exportToJson;
        importJsonBtn.onclick = () => importFileInput.click();
        importFileInput.onchange = (e) => { if (e.target.files[0]) importFromJson(e.target.files[0]); e.target.value = ''; };
        themeToggle.onclick = toggleTheme;
        darkModeToggle.onclick = toggleTheme;
        saveGoalBtn.onclick = () => {
            pushState();
            appData.goal = {
                name: goalName.value,
                target: parseFloat(goalTarget.value) || 0,
                date: goalDate.value,
                initial: parseFloat(goalInitial.value) || 0
            };
            saveToLocalStorage();
            renderAll();
        };
        setBudgetBtn.onclick = () => {
            const cat = budgetCategorySelect.value;
            const limit = parseFloat(budgetLimit.value);
            if (cat && !isNaN(limit) && limit > 0) {
                pushState();
                appData.budgets[cat] = limit;
                saveToLocalStorage();
                renderBudgets();
            } else alert('Выберите категорию и введите лимит');
        };
        addMemberBtn.onclick = () => {
            const name = newMemberName.value.trim();
            if (name && !appData.members.includes(name)) {
                pushState();
                appData.members.push(name);
                saveToLocalStorage();
                renderMembers();
                renderLog();
                newMemberName.value = '';
            }
        };
        savePinBtn.onclick = savePin;
        globalPercent.onchange = () => {
            appData.settings.defaultInterest = parseFloat(globalPercent.value);
            saveToLocalStorage();
            renderYears();
        };
        document.querySelectorAll('input[name="interestType"]').forEach(radio => {
            radio.onchange = () => {
                appData.settings.interestType = document.querySelector('input[name="interestType"]:checked').value;
                saveToLocalStorage();
                renderYears();
            };
        });
        logSearch.oninput = renderLog;
        logTypeFilter.onchange = renderLog;
        logCategoryFilter.onchange = renderLog;
        logMemberFilter.onchange = renderLog;

        // Вкладки
        tabYears.onclick = () => { activeTab = 'years'; renderAll(); };
        tabMonths.onclick = () => { activeTab = 'months'; renderAll(); };
        tabLog.onclick = () => { activeTab = 'log'; renderAll(); };
        tabAnalytics.onclick = () => { activeTab = 'analytics'; renderAll(); };
        tabGoal.onclick = () => { activeTab = 'goal'; renderAll(); };
        tabBudget.onclick = () => { activeTab = 'budget'; renderAll(); };
        tabMembers.onclick = () => { activeTab = 'members'; renderAll(); };
        tabSettings.onclick = () => { activeTab = 'settings'; renderAll(); };
    }

    init();
</script>
</body>
</html>
